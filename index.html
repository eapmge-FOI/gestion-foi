<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion FOI - Pilotage Complet</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js" async></script>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; --success:#059669; --danger:#e11d48;
            --polcant-blue: #334b7a; --apm-gray: #334155; --asp-light: #94a3b8;
            --flag-red: #e11d48; --flag-yellow: #fbbf24;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); padding: 0; }
        
        #loginView { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b, #0f172a); }
        .login-box { background: var(--bg2); padding: 40px; border-radius: 20px; border: 1px solid var(--bg3); text-align: center; width: 90%; max-width: 400px; }
        .google-btn { background: white; color: #444; padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; margin: 25px auto; width: 100%; justify-content: center; }

        .app { max-width:1100px; margin:auto; padding: 20px; }
        header, .mini-header { background:var(--bg2); padding:15px 20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; }

        .card { background:var(--bg2); padding:18px; border-radius:12px; cursor:pointer; border: 1px solid var(--bg3); position: relative; display:flex; flex-direction:column; min-height: 180px; transition: 0.2s; }
        
        /* Styles Corps */
        .style-apm { background: var(--apm-gray) !important; padding-top: 25px; }
        .style-apm::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background: var(--flag-yellow); }
        .style-apm::after { content:''; position:absolute; top:4px; left:0; width:100%; height:4px; background: var(--flag-red); }
        .style-polcant { background: var(--polcant-blue) !important; border-top: 5px solid rgba(255,255,255,0.2); }
        .style-asp { background: var(--asp-light) !important; color: #0f172a; border-top: 5px solid #64748b; }
        .style-asp * { color: #0f172a !important; }

        .prog-container { background: rgba(0,0,0,0.2); height: 8px; border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .prog-bar { height: 100%; background: var(--success); }
        .card-actions { margin-top: auto; display: flex; gap: 8px; align-items: center; }
        
        .btn { background:var(--primary); color: white; border:none; padding: 8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-icon { background: rgba(255,255,255,0.1); border: none; color: inherit; cursor: pointer; padding: 7px; border-radius: 6px; font-size: 0.9rem; }

        .task-item { background: var(--bg2); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--bg3); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .resp-tag { background: var(--bg3); color: var(--primary); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 10px; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 500px; }
        input, select { width:100%; margin: 8px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
        .hidden { display:none !important; }
    </style>
</head>
<body>

<div id="loginView">
    <div class="login-box">
        <h2>🚀 Gestion FOI</h2>
        <button class="google-btn" onclick="handleLogin()">Se connecter avec Google</button>
        <p id="loginError" style="color: var(--danger);"></p>
    </div>
</div>

<div id="mainApp" class="app hidden">
    <div id="formationsView">
        <header>
            <h1>Sessions Actives</h1>
            <div style="display:flex; gap:10px">
                <button class="btn" style="background:#6366f1" onclick="showView('templatesListView')">📂 Modèles</button>
                <button class="btn" style="background:#475569" onclick="showView('archivesView')">📦 Archives</button>
                <button class="btn" onclick="openFormModal(false)">+ Session</button>
                <button class="btn-icon" onclick="handleLogout()">🚪</button>
            </div>
        </header>
        <div id="activeGrid" class="grid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div class="mini-header">
            <button class="btn" onclick="showView('formationsView')">← Retour</button>
            <h2 id="formationTitle"></h2>
            <button class="btn" onclick="openBlocModal()">+ Bloc</button>
        </div>
        <div id="blocsGrid" class="grid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <div class="mini-header">
            <button class="btn" onclick="showView('blocsView')">← Retour</button>
            <h2 id="blocTitle"></h2>
            <button class="btn" onclick="openTaskModal()">+ Tâche</button>
        </div>
        <div id="tasksList"></div>
    </div>

    <div id="templatesListView" class="hidden">
        <header><button class="btn" onclick="showView('formationsView')">← Retour</button><h1>Modèles & Équipe</h1></header>
        <div class="mini-header" style="flex-direction:column; align-items:start">
            <h3>👥 Équipe</h3>
            <div style="display:flex; gap:10px; width:100%"><input id="newMemName" placeholder="Nom"><input id="newMemInit" placeholder="Init"><button class="btn" onclick="addMember()">+</button></div>
            <div id="membersList"></div>
        </div>
        <div id="templateGrid" class="grid"></div>
    </div>
    
    <div id="archivesView" class="hidden">
        <header><button class="btn" onclick="showView('formationsView')">← Retour</button><h1>Archives</h1></header>
        <div id="archivesGrid" class="grid"></div>
    </div>
</div>

<div id="formModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="formModalTitle">Formation</h3>
        <input type="hidden" id="editFormId">
        <input type="hidden" id="isTplHidden">
        <label>Nom</label><input id="fName">
        <label>Corps</label><select id="fType"><option value="apm">APM</option><option value="polcant">PolCant</option><option value="asp">ASP</option></select>
        <div id="dateFields"><label>Début</label><input id="fStart" type="date"><label>Fin</label><input id="fEnd" type="date"></div>
        <button class="btn" style="width:100%" onclick="saveFormation()">Enregistrer</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('formModal')">Annuler</button>
    </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Bloc</h3>
        <input type="hidden" id="editBlocId">
        <label>Nom</label><input id="bName"><label>Date</label><input id="bDate" type="date">
        <button class="btn" style="width:100%" onclick="saveBloc()">Enregistrer</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('blocModal')">Annuler</button>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Tâche</h3>
        <input type="hidden" id="editTaskId">
        <label>Titre</label><input id="tTitle">
        <label>Resp</label><select id="tResp"></select>
        <div style="display:flex; gap:10px">
            <input type="number" id="tVal" value="2">
            <select id="tUnit"><option value="days">Jours</option><option value="weeks" selected>Semaines</option></select>
        </div>
        <button class="btn" style="width:100%; margin-top:10px" onclick="saveTask()">Enregistrer</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('taskModal')">Annuler</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE", authDomain: "gestion-des-taches-foi.firebaseapp.com", projectId: "gestion-des-taches-foi", storageBucket: "gestion-des-taches-foi.firebasestorage.app", messagingSenderId: "538286716668", appId: "1:538286716668:web:b86f8d5f606c78494f4979" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let state = { formations: [], blocs: [], members: [], curForm: null, curBloc: null, view: 'formationsView' };
    const ALLOWED = ["eapmge@gmail.com", "mentors.foi@gmail.com"];

    // --- AUTH ---
    window.handleLogin = () => signInWithPopup(auth, provider).catch(e => document.getElementById("loginError").textContent = e.message);
    window.handleLogout = () => signOut(auth);
    onAuthStateChanged(auth, u => {
        if(u && ALLOWED.includes(u.email)) {
            document.getElementById("loginView").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            startSync();
        } else {
            if(u) signOut(auth);
            document.getElementById("loginView").classList.remove("hidden");
            document.getElementById("mainApp").classList.add("hidden");
        }
    });

    // --- DATA ---
    function startSync() {
        onSnapshot(doc(db, "data", "appState"), s => {
            if(s.exists()){ 
                const d = s.data(); 
                state.formations = d.formations || []; 
                state.blocs = d.blocs || []; 
                state.members = d.members || []; 
                refreshUI(); 
            }
        });
    }
    async function push() { await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs, members: state.members }); }

    // --- UI ---
    window.showView = (v) => { state.view = v; document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); document.getElementById(v).classList.remove('hidden'); refreshUI(); };

    window.refreshUI = () => {
        const sel = document.getElementById("tResp");
        sel.innerHTML = '<option value="">Resp...</option>' + state.members.map(m => `<option value="${m.init}">${m.init}</option>`).join("");
        document.getElementById("membersList").innerHTML = state.members.map(m => `<span class="member-chip">${m.init} <button onclick="delMem('${m.init}')">×</button></span>`).join("");

        if(state.view === 'formationsView') renderGrid("activeGrid", state.formations.filter(f => !f.isTpl && !isOld(f)));
        if(state.view === 'archivesView') renderGrid("archivesGrid", state.formations.filter(f => !f.isTpl && isOld(f)));
        if(state.view === 'templatesListView') renderGrid("templateGrid", state.formations.filter(f => f.isTpl));
        if(state.view === 'blocsView') renderBlocs();
        if(state.view === 'tasksView') renderTasks();
    };

    function renderGrid(id, list) {
        document.getElementById(id).innerHTML = list.map(f => `
            <div class="card style-${f.type}" onclick="enterF(${f.id})">
                <h3>${f.name}</h3>
                <div class="card-actions">
                    <button class="btn-icon" onclick="event.stopPropagation(); openFormModal(${f.isTpl}, ${f.id})">✎</button>
                    <button class="btn-icon" onclick="event.stopPropagation(); delF(${f.id})">🗑️</button>
                    ${f.isTpl ? `<button class="btn" style="font-size:0.7rem" onclick="event.stopPropagation(); deploy(${f.id})">DÉPLOYER</button>` : ''}
                </div>
            </div>`).join("");
    }

    function renderBlocs() {
        const list = state.blocs.filter(b => b.fId === state.curForm);
        document.getElementById("blocsGrid").innerHTML = list.map(b => `
            <div class="card" onclick="enterB(${b.id})">
                <h3>${b.name}</h3>
                <p>${b.date || '-'}</p>
                <div class="card-actions">
                    <button class="btn-icon" onclick="event.stopPropagation(); openBlocModal(${b.id})">✎</button>
                    <button class="btn-icon" onclick="event.stopPropagation(); delB(${b.id})">🗑️</button>
                </div>
            </div>`).join("");
    }

    function renderTasks() {
        const b = state.blocs.find(x => x.id === state.curBloc);
        document.getElementById("tasksList").innerHTML = b.tasks.map(t => `
            <div class="task-item">
                <div onclick="toggleT(${t.id})" style="cursor:pointer">
                    ${t.status === 'done' ? '✅' : '⭕'} <strong>${t.title}</strong> <span class="resp-tag">${t.resp}</span>
                </div>
                <div>
                    <button class="btn-icon" onclick="openTaskModal(${t.id})">✎</button>
                    <button class="btn-icon" onclick="delT(${t.id})">🗑️</button>
                </div>
            </div>`).join("");
    }

    // --- MODALS (OUVERTURE & REMPLISSAGE) ---
    window.openFormModal = (isTpl, id = null) => {
        state.editId = id;
        document.getElementById("isTplHidden").value = isTpl;
        document.getElementById("dateFields").style.display = isTpl ? "none" : "block";
        if(id) {
            const f = state.formations.find(x => x.id === id);
            document.getElementById("fName").value = f.name;
            document.getElementById("fType").value = f.type;
            document.getElementById("fStart").value = f.start || "";
            document.getElementById("fEnd").value = f.end || "";
        } else {
            document.getElementById("fName").value = "";
        }
        showModal("formModal");
    };

    window.openBlocModal = (id = null) => {
        state.editId = id;
        if(id) {
            const b = state.blocs.find(x => x.id === id);
            document.getElementById("bName").value = b.name;
            document.getElementById("bDate").value = b.date;
        } else {
            document.getElementById("bName").value = "";
            document.getElementById("bDate").value = "";
        }
        showModal("blocModal");
    };

    window.openTaskModal = (id = null) => {
        state.editId = id;
        if(id) {
            const b = state.blocs.find(x => x.id === state.curBloc);
            const t = b.tasks.find(x => x.id === id);
            document.getElementById("tTitle").value = t.title;
            document.getElementById("tResp").value = t.resp;
            document.getElementById("tVal").value = t.val;
            document.getElementById("tUnit").value = t.unit;
        } else {
            document.getElementById("tTitle").value = "";
        }
        showModal("taskModal");
    };

    // --- SAVE LOGIC ---
    window.saveFormation = () => {
        const data = { id: state.editId || Date.now(), name: document.getElementById("fName").value, type: document.getElementById("fType").value, isTpl: document.getElementById("isTplHidden").value === 'true', start: document.getElementById("fStart").value, end: document.getElementById("fEnd").value };
        if(state.editId) state.formations = state.formations.map(f => f.id === state.editId ? data : f);
        else state.formations.push(data);
        push(); closeModal("formModal");
    };

    window.saveBloc = () => {
        const data = { id: state.editId || Date.now(), fId: state.curForm, name: document.getElementById("bName").value, date: document.getElementById("bDate").value, tasks: state.editId ? state.blocs.find(x => x.id === state.editId).tasks : [] };
        if(state.editId) state.blocs = state.blocs.map(b => b.id === state.editId ? data : b);
        else state.blocs.push(data);
        push(); closeModal("blocModal");
    };

    window.saveTask = () => {
        const b = state.blocs.find(x => x.id === state.curBloc);
        const data = { id: state.editId || Date.now(), title: document.getElementById("tTitle").value, resp: document.getElementById("tResp").value, val: document.getElementById("tVal").value, unit: document.getElementById("tUnit").value, status: state.editId ? b.tasks.find(x => x.id === state.editId).status : 'todo' };
        if(state.editId) b.tasks = b.tasks.map(t => t.id === state.editId ? data : t);
        else b.tasks.push(data);
        push(); closeModal("taskModal");
    };

    // --- NAVIGATION & SUPPRESSION ---
    window.enterF = (id) => { state.curForm = id; document.getElementById("formationTitle").textContent = state.formations.find(f => f.id === id).name; showView('blocsView'); };
    window.enterB = (id) => { state.curBloc = id; document.getElementById("blocTitle").textContent = state.blocs.find(b => b.id === id).name; showView('tasksView'); };
    window.delF = (id) => { if(confirm("Supprimer?")) { state.formations = state.formations.filter(f => f.id !== id); push(); } };
    window.delB = (id) => { if(confirm("Supprimer?")) { state.blocs = state.blocs.filter(b => b.id !== id); push(); } };
    window.delT = (id) => { const b = state.blocs.find(x => x.id === state.curBloc); b.tasks = b.tasks.filter(t => t.id !== id); push(); };
    window.toggleT = (id) => { const b = state.blocs.find(x => x.id === state.curBloc); const t = b.tasks.find(x => x.id === id); t.status = t.status === 'done' ? 'todo' : 'done'; push(); };
    
    window.showModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => document.getElementById(id).classList.add("hidden");
    function isOld(f) { return f.end && new Date(f.end) < new Date(); }
</script>
</body>
</html>
