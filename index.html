<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion FOI - Pilotage Intégral</title>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; --success:#059669; --danger:#dc2626;
            --polcant-blue: #334b7a; --apm-gray: #334155; --asp-light: #94a3b8;
            --flag-red: #e11d48; --flag-yellow: #fbbf24;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); padding: 20px; }
        .app { max-width:1100px; margin:auto; }
        
        header, .mini-header { background:var(--bg2); padding:15px 20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; }

        .card { background:var(--bg2); padding:18px; border-radius:12px; cursor:pointer; border: 1px solid var(--bg3); position: relative; display:flex; flex-direction:column; min-height: 160px; }
        .card:hover { border-color: var(--primary); }
        
        /* Styles Corps */
        .style-apm { border-top: 5px solid var(--flag-yellow); }
        .style-polcant { border-top: 5px solid var(--polcant-blue); }
        .style-asp { border-top: 5px solid var(--asp-light); }

        .prog-container { background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .prog-bar { height: 100%; background: var(--success); transition: width 0.4s; }

        .btn { background:var(--primary); color: white; border:none; padding: 8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-icon { background: rgba(255,255,255,0.05); border: none; color: var(--text2); cursor: pointer; padding: 8px; border-radius: 6px; font-size: 1rem; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: white; }

        .task-item { background: var(--bg2); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--bg3); padding: 15px; }
        .task-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; font-size: 0.8rem; color: var(--text2); }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width:100%; margin: 8px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
        .hidden { display:none !important; }
    </style>
</head>
<body>

<div class="app">
    <div id="formationsView">
        <header>
            <h1>🚀 Sessions Actives</h1>
            <div style="display:flex; gap:10px">
                <button class="btn" style="background:#6366f1" onclick="showView('templatesListView')">📂 Modèles</button>
                <button class="btn" onclick="openFormModal(false)">+ Session</button>
            </div>
        </header>
        <div class="grid" id="activeGrid"></div>
    </div>

    <div id="templatesListView" class="hidden">
        <header>
            <button class="btn" style="background:var(--bg3)" onclick="showView('formationsView')">← Retour</button>
            <h1>📂 Bibliothèque Modèles</h1>
            <button class="btn" style="background:#6366f1" onclick="openFormModal(true)">+ Nouveau Modèle</button>
        </header>
        <div class="grid" id="templateGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div class="mini-header">
            <button class="btn" style="background:var(--bg3)" id="backBtn">← Retour</button>
            <h2 id="formationTitle"></h2>
            <button class="btn" onclick="openModal('blocModal')">+ Bloc</button>
        </div>
        <div class="grid" id="blocsGrid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <div class="mini-header">
            <button class="btn" style="background:var(--bg3)" onclick="showView('blocsView')">← Retour</button>
            <div id="blocHeaderInfo"></div>
            <button class="btn" onclick="openModal('taskModal')">+ Tâche</button>
        </div>
        <div id="tasksList"></div>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Paramètres de la tâche</h3>
        <label>Titre</label><input id="taskTitle">
        
        <div style="background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px;">
            <p style="font-size: 0.8rem; color: var(--primary); margin-bottom: 5px;">DÉBUT (Quand commencer)</p>
            <div style="display:flex; gap:5px">
                <input type="number" id="taskStartVal" value="4">
                <select id="taskStartUnit">
                    <option value="days">Jours</option>
                    <option value="weeks" selected>Semaines</option>
                    <option value="months">Mois</option>
                </select>
            </div>
            <p style="font-size: 0.8rem; color: var(--danger); margin-bottom: 5px;">ÉCHÉANCE (Quand finir)</p>
            <div style="display:flex; gap:5px">
                <input type="number" id="taskEndVal" value="2">
                <select id="taskEndUnit">
                    <option value="days">Jours</option>
                    <option value="weeks" selected>Semaines</option>
                    <option value="months">Mois</option>
                </select>
            </div>
            <small style="opacity: 0.6">Temps calculé AVANT la date du bloc.</small>
        </div>

        <label>Responsable</label><input id="taskResp">
        <label>Description</label><textarea id="taskDesc"></textarea>
        
        <div style="display:flex; gap:10px">
            <button class="btn" style="background:var(--bg3); flex:1" onclick="closeModal('taskModal')">Annuler</button>
            <button class="btn" style="flex:1" onclick="saveTask()">Enregistrer</button>
        </div>
    </div>
</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Configuration Formation</h3>
        <input type="hidden" id="formIsTemplate">
        <label>Nom</label><input id="formName">
        <label>Corps</label>
        <select id="formType">
            <option value="apm">APM</option>
            <option value="polcant">PolCant</option>
            <option value="asp">ASP</option>
        </select>
        <div id="dateSection"><label>Date début</label><input id="formStart" type="date"></div>
        <button class="btn" style="width:100%" onclick="saveFormation()">Enregistrer</button>
    </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Configuration Bloc</h3>
        <label>Nom</label><input id="blocName">
        <label>Date</label><input id="blocDate" type="date">
        <div style="display:flex; gap:10px">
            <input id="blocR1" placeholder="Resp 1">
            <input id="blocR2" placeholder="Resp 2">
        </div>
        <button class="btn" style="width:100%" onclick="saveBloc()">Enregistrer</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE", authDomain: "gestion-des-taches-foi.firebaseapp.com", projectId: "gestion-des-taches-foi", storageBucket: "gestion-des-taches-foi.firebasestorage.app", messagingSenderId: "538286716668", appId: "1:538286716668:web:b86f8d5f606c78494f4979" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let state = { formations: [], blocs: [], currentFormationId: null, currentBlocId: null, editingId: null, currentView: 'formationsView', lastParentView: 'formationsView' };

    onSnapshot(doc(db, "data", "appState"), (docSnap) => {
        if (docSnap.exists()) {
            const d = docSnap.data();
            state.formations = d.formations || [];
            state.blocs = d.blocs || [];
            refreshUI();
        }
    });

    async function push() { await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs }); }

    function calcDate(base, val, unit) {
        if(!base) return "??";
        let d = new Date(base);
        if(unit === 'days') d.setDate(d.getDate() - val);
        else if(unit === 'weeks') d.setDate(d.getDate() - (val*7));
        else if(unit === 'months') d.setMonth(d.getMonth() - val);
        return d.toLocaleDateString('fr-FR');
    }

    function getProg(items) {
        if(!items || items.length === 0) return 0;
        return Math.round((items.filter(i => i.status === 'done').length / items.length) * 100);
    }

    // --- RENDUS ---
    window.refreshUI = () => {
        if(state.currentView === 'formationsView') {
            const list = state.formations.filter(f => !f.isTemplate).sort((a,b) => new Date(a.start) - new Date(b.start));
            renderCards("activeGrid", list);
        } else if(state.currentView === 'templatesListView') {
            renderCards("templateGrid", state.formations.filter(f => f.isTemplate));
        } else if(state.currentView === 'blocsView') {
            const list = state.blocs.filter(b => b.formationId === state.currentFormationId).sort((a,b) => new Date(a.date) - new Date(b.date));
            const grid = document.getElementById("blocsGrid");
            grid.innerHTML = list.map(b => `
                <div class="card" onclick="enterBloc(${b.id})">
                    <h3>${b.name}</h3>
                    <p>📅 ${b.date || 'Modèle'}</p>
                    <div class="prog-container"><div class="prog-bar" style="width:${getProg(b.tasks)}%"></div></div>
                    <div class="card-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); editBloc(${b.id})">✏️</button>
                        <button class="btn-icon" onclick="event.stopPropagation(); deleteBloc(${b.id})">🗑️</button>
                    </div>
                </div>
            `).join("");
        } else if(state.currentView === 'tasksView') {
            const b = state.blocs.find(x => x.id === state.currentBlocId);
            document.getElementById("tasksList").innerHTML = b.tasks.map(t => `
                <div class="task-item">
                    <div style="display:flex; justify-content:space-between; align-items:start">
                        <div onclick="toggleTask(${t.id})" style="cursor:pointer">
                            <span style="color:${t.status==='done'?'var(--success)':'#999'}">${t.status==='done'?'✅':'⭕'}</span>
                            <strong style="margin-left:8px">${t.title}</strong>
                        </div>
                        <div style="display:flex; gap:5px">
                            <button class="btn-icon" onclick="editTask(${t.id})">✏️</button>
                            <button class="btn-icon" onclick="deleteTask(${t.id})">🗑️</button>
                        </div>
                    </div>
                    <div class="task-dates">
                        <span>▶️ Début : ${calcDate(b.date, t.sVal, t.sUnit)}</span>
                        <span>🚩 Échéance : ${calcDate(b.date, t.eVal, t.eUnit)}</span>
                    </div>
                </div>
            `).join("");
        }
    };

    function renderCards(id, list) {
        document.getElementById(id).innerHTML = list.map(f => {
            const tasks = state.blocs.filter(b => b.formationId === f.id).flatMap(b => b.tasks);
            return `
                <div class="card style-${f.type}" onclick="enterFormation(${f.id})">
                    <h3>${f.name}</h3>
                    <div class="prog-container"><div class="prog-bar" style="width:${getProg(tasks)}%"></div></div>
                    <div class="card-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); editForm(${f.id})">✏️</button>
                        <button class="btn-icon" onclick="event.stopPropagation(); deleteForm(${f.id})">🗑️</button>
                        ${f.isTemplate ? `<button class="btn" onclick="event.stopPropagation(); deploy(${f.id})">⚡</button>` : ''}
                    </div>
                </div>
            `;
        }).join("");
    }

    // --- FONCTIONS CRUD ---
    window.saveFormation = () => {
        const isTpl = document.getElementById("formIsTemplate").value === "true";
        const d = { id: state.editingId || Date.now(), name: document.getElementById("formName").value, type: document.getElementById("formType").value, isTemplate: isTpl, start: document.getElementById("formStart").value };
        if(state.editingId) state.formations = state.formations.map(f => f.id === state.editingId ? d : f);
        else state.formations.push(d);
        push(); closeModal('formationModal');
    };

    window.saveBloc = () => {
        const old = state.editingId ? state.blocs.find(x => x.id === state.editingId) : {tasks:[]};
        const d = { id: state.editingId || Date.now(), formationId: state.currentFormationId, name: document.getElementById("blocName").value, date: document.getElementById("blocDate").value, r1: document.getElementById("blocR1").value, r2: document.getElementById("blocR2").value, tasks: old.tasks };
        if(state.editingId) state.blocs = state.blocs.map(b => b.id === state.editingId ? d : b);
        else state.blocs.push(d);
        push(); closeModal('blocModal');
    };

    window.saveTask = () => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = { id: state.editingId || Date.now(), title: document.getElementById("taskTitle").value, resp: document.getElementById("taskResp").value, desc: document.getElementById("taskDesc").value, sVal: parseInt(document.getElementById("taskStartVal").value), sUnit: document.getElementById("taskStartUnit").value, eVal: parseInt(document.getElementById("taskEndVal").value), eUnit: document.getElementById("taskEndUnit").value, status: 'todo' };
        if(state.editingId) b.tasks = b.tasks.map(x => x.id === state.editingId ? {...t, status: x.status} : x);
        else b.tasks.push(t);
        push(); closeModal('taskModal');
    };

    // --- SUPPRESSIONS ---
    window.deleteForm = (id) => { if(confirm("Supprimer cette formation et tous ses blocs ?")) { state.formations = state.formations.filter(f => f.id !== id); state.blocs = state.blocs.filter(b => b.formationId !== id); push(); } };
    window.deleteBloc = (id) => { if(confirm("Supprimer ce bloc ?")) { state.blocs = state.blocs.filter(b => b.id !== id); push(); } };
    window.deleteTask = (id) => { if(confirm("Supprimer cette tâche ?")) { const b = state.blocs.find(x => x.id === state.currentBlocId); b.tasks = b.tasks.filter(t => t.id !== id); push(); } };

    // --- EDITIONS ---
    window.editForm = (id) => {
        state.editingId = id; const f = state.formations.find(x => x.id === id);
        document.getElementById("formName").value = f.name; document.getElementById("formType").value = f.type;
        document.getElementById("formIsTemplate").value = f.isTemplate; openModal('formationModal');
    };
    window.editBloc = (id) => {
        state.editingId = id; const b = state.blocs.find(x => x.id === id);
        document.getElementById("blocName").value = b.name; document.getElementById("blocDate").value = b.date;
        document.getElementById("blocR1").value = b.r1; document.getElementById("blocR2").value = b.r2; openModal('blocModal');
    };
    window.editTask = (id) => {
        state.editingId = id; const b = state.blocs.find(x => x.id === state.currentBlocId); const t = b.tasks.find(x => x.id === id);
        document.getElementById("taskTitle").value = t.title; document.getElementById("taskResp").value = t.resp;
        document.getElementById("taskStartVal").value = t.sVal; document.getElementById("taskEndVal").value = t.eVal;
        openModal('taskModal');
    };

    // --- NAVIGATION ---
    window.showView = (id) => {
        if(id === 'formationsView' || id === 'templatesListView') state.lastParentView = id;
        state.currentView = id; document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden'); refreshUI();
    };
    window.enterFormation = (id) => { state.currentFormationId = id; document.getElementById("formationTitle").textContent = state.formations.find(x => x.id === id).name; showView('blocsView'); };
    window.enterBloc = (id) => { state.currentBlocId = id; const b = state.blocs.find(x => x.id === id); document.getElementById("blocHeaderInfo").innerHTML = `<h2>${b.name}</h2><small>Resp: ${b.r1}/${b.r2}</small>`; showView('tasksView'); };
    window.toggleTask = (id) => { const b = state.blocs.find(x => x.id === state.currentBlocId); const t = b.tasks.find(x => x.id === id); t.status = t.status === 'done' ? 'todo' : 'done'; push(); };
    window.openFormModal = (tpl) => { state.editingId = null; document.getElementById("formIsTemplate").value = tpl; openModal('formationModal'); };
    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => { document.getElementById(id).classList.add("hidden"); state.editingId = null; };
    document.getElementById("backBtn").onclick = () => showView(state.lastParentView);
</script>
</body>
</html>
