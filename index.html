<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion FOI - Sécurisé</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js" async></script>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; --success:#059669; --danger:#e11d48;
            --apm-gray: #334155; --polcant-blue: #334b7a; --asp-light: #94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg1); color:var(--text1); min-height: 100vh; }
        
        /* LOGIN */
        #loginView { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1e293b, #0f172a); }
        .login-box { background: var(--bg2); padding: 40px; border-radius: 20px; border: 1px solid var(--bg3); text-align: center; width: 90%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .google-btn { background: white; color: #444; padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 12px; margin: 25px auto; transition: 0.2s; width: 100%; justify-content: center; }
        .google-btn:hover { background: #f8fafc; transform: scale(1.02); }

        /* APP */
        .app { max-width:1200px; margin:auto; padding: 20px; }
        header, .mini-header { background:var(--bg2); padding:20px; border-radius:15px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; }

        .card { background:var(--bg2); padding:20px; border-radius:15px; cursor:pointer; border: 1px solid var(--bg3); position: relative; transition: 0.3s; display: flex; flex-direction: column; min-height: 180px; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .style-apm { border-top: 6px solid #fbbf24; }
        .style-polcant { border-top: 6px solid #334b7a; }
        .style-asp { border-top: 6px solid #64748b; background: #e2e8f0 !important; color: #0f172a !important; }

        .prog-container { background: rgba(0,0,0,0.2); height: 8px; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .prog-bar { height: 100%; background: var(--success); transition: width 0.5s; }

        .btn { background:var(--primary); color: white; border:none; padding: 10px 18px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-icon { background: rgba(255,255,255,0.1); border: none; color: inherit; cursor: pointer; padding: 8px; border-radius: 6px; }
        
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg2); padding: 30px; border-radius: 15px; width: 95%; max-width: 500px; }
        input, select { width:100%; margin: 10px 0 20px 0; padding:12px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 8px; }
        
        .member-chip { display: inline-flex; align-items: center; background: var(--bg3); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 0 5px 5px 0; }
        .hidden { display:none !important; }
    </style>
</head>
<body>

<div id="loginView">
    <div class="login-box">
        <h2>🚀 Gestion FOI</h2>
        <p style="color: var(--text2); margin-top: 10px;">Accès sécurisé Mentors</p>
        <button class="google-btn" onclick="handleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_google_color_16dp.svg" width="20">
            Se connecter avec Google
        </button>
        <p id="loginError" style="color: var(--danger); font-size: 0.8rem; margin-top: 10px;"></p>
    </div>
</div>

<div id="mainApp" class="app hidden">
    <div id="formationsView">
        <header>
            <div>
                <h1 id="viewTitle">Sessions Actives</h1>
                <small id="userEmail" style="color: var(--primary)"></small>
            </div>
            <div style="display:flex; gap:10px">
                <button class="btn" style="background:#6366f1" onclick="showView('templatesListView')">⚙️ Config</button>
                <button class="btn" style="background:#475569" onclick="showView('archivesView')">📦 Archives</button>
                <button class="btn" onclick="openFormModal(false)">+ Session</button>
                <button class="btn-icon" onclick="handleLogout()">🚪</button>
            </div>
        </header>
        <div id="activeGrid" class="grid"></div>
    </div>

    <div id="archivesView" class="hidden">
        <header><button class="btn" onclick="showView('formationsView')">← Retour</button><h1>Archives</h1><div></div></header>
        <div id="archivesGrid" class="grid"></div>
    </div>

    <div id="templatesListView" class="hidden">
        <header><button class="btn" onclick="showView('formationsView')">← Retour</button><h1>Configuration</h1></header>
        <div class="mini-header" style="flex-direction: column; align-items: start;">
            <h3>Équipe</h3>
            <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
                <input id="newMemberName" placeholder="Prénom" style="margin:0">
                <input id="newMemberInitials" placeholder="Init" style="margin:0">
                <input id="newMemberEmail" placeholder="Email" style="margin:0">
                <button class="btn" onclick="addMember()">Ajouter</button>
            </div>
            <div id="membersList" style="margin-top:10px"></div>
        </div>
        <div class="mini-header"><h3>Modèles</h3><button class="btn" onclick="openFormModal(true)">+ Modèle</button></div>
        <div id="templateGrid" class="grid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div class="mini-header"><button class="btn" onclick="showView('formationsView')">← Retour</button><h2 id="currentFormTitle"></h2><button class="btn" onclick="openModal('blocModal')">+ Bloc</button></div>
        <div id="blocsGrid" class="grid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <div class="mini-header"><button class="btn" onclick="showView('blocsView')">← Retour</button><h2 id="currentBlocTitle"></h2><button class="btn" onclick="openModal('taskModal')">+ Tâche</button></div>
        <div id="tasksList" style="display:grid; gap:10px"></div>
    </div>
</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Nouvelle Session</h3>
        <input type="hidden" id="formIsTemplate">
        <input id="formName" placeholder="Nom">
        <select id="formType"><option value="apm">APM</option><option value="polcant">PolCant</option><option value="asp">ASP</option></select>
        <div id="dateSection">
            <input id="formStart" type="date">
            <input id="formEnd" type="date">
        </div>
        <button class="btn" style="width:100%" onclick="saveFormation()">Enregistrer</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('formationModal')">Annuler</button>
    </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Nouveau Bloc</h3>
        <input id="blocName" placeholder="Nom du bloc">
        <input id="blocDate" type="date">
        <button class="btn" style="width:100%" onclick="saveBloc()">Enregistrer</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('blocModal')">Annuler</button>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Nouvelle Tâche</h3>
        <input id="taskTitle" placeholder="Titre">
        <select id="taskRespSelect"></select>
        <div style="display:flex; gap:10px">
            <input type="number" id="taskEndVal" value="2">
            <select id="taskEndUnit"><option value="weeks">Semaines</option><option value="days">Jours</option></select>
        </div>
        <button class="btn" style="width:100%" onclick="saveTask()">Enregistrer</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('taskModal')">Annuler</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE", 
        authDomain: "gestion-des-taches-foi.firebaseapp.com", 
        projectId: "gestion-des-taches-foi", 
        storageBucket: "gestion-des-taches-foi.firebasestorage.app", 
        messagingSenderId: "538286716668", 
        appId: "1:538286716668:web:b86f8d5f606c78494f4979" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const ALLOWED_EMAILS = ["eapmge@gmail.com", "mentors.foi@gmail.com"];
    let state = { formations: [], blocs: [], members: [], currentFormationId: null, currentBlocId: null, currentView: 'formationsView' };

    // --- AUTH ---
    window.handleLogin = async () => {
        try { await signInWithPopup(auth, provider); } 
        catch (e) { document.getElementById("loginError").textContent = "Erreur: " + e.message; }
    };

    window.handleLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (ALLOWED_EMAILS.includes(user.email)) {
                document.getElementById("loginView").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("userEmail").textContent = user.email;
                startSync();
            } else {
                alert("Accès non autorisé.");
                signOut(auth);
            }
        } else {
            document.getElementById("loginView").classList.remove("hidden");
            document.getElementById("mainApp").classList.add("hidden");
        }
    });

    // --- DATA ---
    function startSync() {
        onSnapshot(doc(db, "data", "appState"), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                state.formations = data.formations || [];
                state.blocs = data.blocs || [];
                state.members = data.members || [];
                refreshUI();
            }
        });
    }

    async function push() {
        await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs, members: state.members });
    }

    // --- LOGIQUE UI ---
    window.refreshUI = () => {
        document.getElementById("membersList").innerHTML = state.members.map(m => `<span class="member-chip">${m.initials} <button onclick="removeMember('${m.initials}')" style="background:none; border:none; color:red; cursor:pointer">×</button></span>`).join("");
        document.getElementById("taskRespSelect").innerHTML = '<option value="">Responsable...</option>' + state.members.map(m => `<option value="${m.initials}">${m.initials}</option>`).join("");

        if(state.currentView === 'formationsView') renderGrid("activeGrid", state.formations.filter(f => !f.isTemplate && !isArchived(f)));
        if(state.currentView === 'archivesView') renderGrid("archivesGrid", state.formations.filter(f => !f.isTemplate && isArchived(f)));
        if(state.currentView === 'templatesListView') renderGrid("templateGrid", state.formations.filter(f => f.isTemplate));
        if(state.currentView === 'blocsView') renderBlocs();
        if(state.currentView === 'tasksView') renderTasks();
    };

    function renderGrid(id, list) {
        document.getElementById(id).innerHTML = list.map(f => {
            const fBlocs = state.blocs.filter(b => b.formationId === f.id);
            const allTasks = fBlocs.flatMap(b => b.tasks);
            const done = allTasks.filter(t => t.status === 'done').length;
            const prog = allTasks.length ? (done / allTasks.length) * 100 : 0;
            return `
                <div class="card style-${f.type}" onclick="enterFormation(${f.id})">
                    <h3>${f.name}</h3>
                    <div class="prog-container"><div class="prog-bar" style="width:${prog}%"></div></div>
                    <div style="margin-top:auto">
                        <button class="btn-icon" onclick="event.stopPropagation(); deleteForm(${f.id})">🗑️</button>
                        ${f.isTemplate ? `<button class="btn" style="font-size:0.7rem" onclick="event.stopPropagation(); deploy(${f.id})">DÉPLOYER</button>` : ''}
                    </div>
                </div>`;
        }).join("");
    }

    function renderBlocs() {
        const list = state.blocs.filter(b => b.formationId === state.currentFormationId);
        document.getElementById("blocsGrid").innerHTML = list.map(b => `
            <div class="card" onclick="enterBloc(${b.id})">
                <h3>${b.name}</h3>
                <p>${b.date ? new Date(b.date).toLocaleDateString() : 'Sans date'}</p>
                <button class="btn-icon" onclick="event.stopPropagation(); deleteBloc(${b.id})">🗑️</button>
            </div>`).join("");
    }

    function renderTasks() {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        document.getElementById("tasksList").innerHTML = b.tasks.map(t => `
            <div class="card" style="min-height:auto; flex-direction:row; justify-content:space-between; align-items:center; padding:10px" onclick="toggleTask(${t.id})">
                <span>${t.status === 'done' ? '✅' : '⭕'} <strong>${t.title}</strong> (${t.resp})</span>
                <button class="btn-icon" onclick="event.stopPropagation(); deleteTask(${t.id})">🗑️</button>
            </div>`).join("");
    }

    // --- ACTIONS ---
    window.showView = (id) => { state.currentView = id; document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); refreshUI(); };
    window.enterFormation = (id) => { state.currentFormationId = id; document.getElementById("currentFormTitle").textContent = state.formations.find(f => f.id === id).name; showView('blocsView'); };
    window.enterBloc = (id) => { state.currentBlocId = id; document.getElementById("currentBlocTitle").textContent = state.blocs.find(b => b.id === id).name; showView('tasksView'); };
    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => document.getElementById(id).classList.add("hidden");
    window.openFormModal = (tpl) => { document.getElementById("formIsTemplate").value = tpl; document.getElementById("dateSection").classList.toggle("hidden", tpl); openModal('formationModal'); };
    
    window.saveFormation = () => {
        state.formations.push({ id: Date.now(), name: document.getElementById("formName").value, type: document.getElementById("formType").value, isTemplate: document.getElementById("formIsTemplate").value === 'true', start: document.getElementById("formStart").value, end: document.getElementById("formEnd").value });
        push(); closeModal('formationModal');
    };

    window.saveBloc = () => {
        state.blocs.push({ id: Date.now(), formationId: state.currentFormationId, name: document.getElementById("blocName").value, date: document.getElementById("blocDate").value, tasks: [] });
        push(); closeModal('blocModal');
    };

    window.saveTask = () => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        b.tasks.push({ id: Date.now(), title: document.getElementById("taskTitle").value, resp: document.getElementById("taskRespSelect").value, eVal: document.getElementById("taskEndVal").value, eUnit: document.getElementById("taskEndUnit").value, status: 'todo' });
        push(); closeModal('taskModal');
    };

    window.toggleTask = (id) => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = b.tasks.find(x => x.id === id);
        t.status = t.status === 'done' ? 'todo' : 'done';
        push();
    };

    window.addMember = () => {
        const i = document.getElementById("newMemberInitials").value.toUpperCase();
        if(i) { state.members.push({ name: document.getElementById("newMemberName").value, initials: i, email: document.getElementById("newMemberEmail").value }); push(); }
    };
    window.removeMember = (init) => { state.members = state.members.filter(m => m.initials !== init); push(); };
    window.deleteForm = (id) => { if(confirm("Supprimer ?")) { state.formations = state.formations.filter(f => f.id !== id); state.blocs = state.blocs.filter(b => b.formationId !== id); push(); } };
    window.deleteBloc = (id) => { if(confirm("Supprimer ?")) { state.blocs = state.blocs.filter(b => b.id !== id); push(); } };
    window.deleteTask = (id) => { const b = state.blocs.find(x => x.id === state.currentBlocId); b.tasks = b.tasks.filter(t => t.id !== id); push(); };
    
    function isArchived(f) { return f.end && new Date(f.end) < new Date(); }
</script>
</body>
</html>
