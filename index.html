<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion FOI - Modèles & Historique</title>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; 
            --success:#059669; --danger:#dc2626; --archive:#64748b;
            --polcant-blue: #334b7a; --apm-gray: #334155; --asp-light: #94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); padding: 10px 20px; }
        .app { max-width:1200px; margin:auto; }
        
        header, .mini-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        header { background:var(--bg2); padding:15px 20px; border-radius:12px; border: 1px solid var(--bg3); }
        
        .section-title { margin: 30px 0 15px 0; font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; display: flex; justify-content: space-between; align-items: center; }

        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px; }

        .card { background:var(--bg2); padding:18px; border-radius:12px; cursor:pointer; transition:.2s; border: 1px solid var(--bg3); position: relative; display:flex; flex-direction:column; min-height: 150px; }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }
        
        /* Styles spécifiques */
        .card.style-apm { background: var(--apm-gray); border-top: 4px solid var(--flag-yellow); }
        .card.style-polcant { background: var(--polcant-blue); }
        .card.style-asp { background: var(--asp-light); color: #0f172a; }
        .card.style-asp h3, .card.style-asp p, .card.style-asp small { color: #0f172a; }
        
        /* Badge Modèle */
        .template-badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

        .prog-bg { background: rgba(0,0,0,0.2); height: 6px; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .prog-fill { height: 100%; transition: 0.6s; background: var(--success); }

        .btn { background:var(--primary); color: white; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 0.85rem; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; margin-top: 10px; }
        .btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; padding: 5px; }

        .card-actions { margin-top: auto; display: flex; gap: 8px; padding-top: 10px; }
        .hidden { display:none !important; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 500px; border: 1px solid var(--bg3); }
        input, select { width:100%; margin: 8px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
    </style>
</head>

<body>
<div class="app">
    <div id="formationsView">
        <header>
            <h1>📋 Gestion FOI</h1>
            <button class="btn" onclick="openModal('formationModal')">+ Nouveau Modèle/Session</button>
        </header>

        <div class="section-title">🚀 Sessions Actives</div>
        <div class="grid" id="activeGrid"></div>

        <div class="section-title">📂 Modèles de Référence</div>
        <div class="grid" id="templateGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div class="mini-header" style="margin-top:20px;">
            <button class="btn" style="background:var(--bg3)" onclick="showView('formationsView')">← Retour</button>
            <h2 id="formationTitle"></h2>
            <button class="btn" onclick="openModal('blocModal')">+ Bloc</button>
        </div>
        <div class="grid" id="blocsGrid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <div class="mini-header" style="margin-top:20px;">
            <button class="btn" style="background:var(--bg3)" onclick="showView('blocsView')">← Retour</button>
            <h2 id="blocTitle"></h2>
            <button class="btn" onclick="openModal('taskModal')">+ Tâche</button>
        </div>
        <div id="tasksList"></div>
    </div>
</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="formModalTitle">Configuration Formation</h3>
        <label>Nom</label><input id="formName" placeholder="Ex: FOI 2026-1">
        <label>Corps</label>
        <select id="formType">
            <option value="pm">APM</option>
            <option value="pc">PolCant</option>
            <option value="asp">ASP</option>
        </select>
        <label>Type de fiche</label>
        <select id="formIsTemplate">
            <option value="false">Session Active (avec dates)</option>
            <option value="true">Modèle de base (réutilisable)</option>
        </select>
        <div id="dateFields">
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>Début</label><input id="formStart" type="date"></div>
                <div style="flex:1"><label>Fin</label><input id="formEnd" type="date"></div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn" style="background:var(--bg3); flex:1" onclick="closeModal('formationModal')">Annuler</button>
            <button class="btn" style="flex:1" onclick="saveFormation()">Enregistrer</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE",
        authDomain: "gestion-des-taches-foi.firebaseapp.com",
        projectId: "gestion-des-taches-foi",
        storageBucket: "gestion-des-taches-foi.firebasestorage.app",
        messagingSenderId: "538286716668",
        appId: "1:538286716668:web:b86f8d5f606c78494f4979"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let state = { formations: [], blocs: [], currentFormationId: null, currentView: 'formationsView' };

    onSnapshot(doc(db, "data", "appState"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            state.formations = data.formations || [];
            state.blocs = data.blocs || [];
            refreshUI();
        }
    });

    async function save() { await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs }); }

    function refreshUI() {
        if(state.currentView === 'formationsView') {
            renderGrid("activeGrid", state.formations.filter(f => f.isTemplate === false || f.isTemplate === "false"));
            renderGrid("templateGrid", state.formations.filter(f => f.isTemplate === true || f.isTemplate === "true"));
        } else if(state.currentView === 'blocsView') renderBlocs();
    }

    window.renderGrid = (containerId, list) => {
        const grid = document.getElementById(containerId);
        // Tri chronologique pour les actives
        const items = containerId === "activeGrid" ? list.sort((a,b) => new Date(a.start) - new Date(b.start)) : list;
        
        grid.innerHTML = items.map(f => {
            const isTpl = f.isTemplate === true || f.isTemplate === "true";
            return `
                <div class="card style-${f.type}" onclick="enterFormation(${f.id})">
                    ${isTpl ? '<span class="template-badge">Modèle</span>' : ''}
                    <h3>${f.name}</h3>
                    <p style="font-size:0.8rem; opacity:0.8">${f.type.toUpperCase()}</p>
                    ${!isTpl ? `<small>📅 ${new Date(f.start).toLocaleDateString()} - ${new Date(f.end).toLocaleDateString()}</small>` : '<small>Prêt à l\'emploi</small>'}
                    
                    <div class="card-actions">
                        <button class="btn-icon" onclick="deleteFormation(event, ${f.id})">🗑️</button>
                        ${isTpl ? `<button class="btn-outline" onclick="instantiateTemplate(event, ${f.id})">⚡ Créer Session</button>` : ''}
                    </div>
                </div>
            `;
        }).join("");
    }

    window.saveFormation = () => {
        const isTpl = document.getElementById("formIsTemplate").value;
        const data = {
            id: Date.now(),
            name: document.getElementById("formName").value,
            type: document.getElementById("formType").value,
            isTemplate: isTpl,
            start: isTpl === "true" ? "" : document.getElementById("formStart").value,
            end: isTpl === "true" ? "" : document.getElementById("formEnd").value
        };
        state.formations.push(data);
        save();
        closeModal('formationModal');
    }

    window.instantiateTemplate = (e, id) => {
        e.stopPropagation();
        const tpl = state.formations.find(f => f.id === id);
        const newName = prompt("Nom de la nouvelle session ?", tpl.name + " - " + new Date().getFullYear());
        const newDate = prompt("Date de début (AAAA-MM-JJ) ?");
        
        if(newName && newDate) {
            const newId = Date.now();
            // Création formation
            state.formations.push({ ...tpl, id: newId, name: newName, isTemplate: false, start: newDate, end: "" });
            // Duplication blocs
            state.blocs.filter(b => b.formationId === id).forEach(b => {
                state.blocs.push({ ...b, id: Math.random(), formationId: newId, tasks: b.tasks.map(t => ({...t, id: Math.random(), status: 'todo'})) });
            });
            save();
        }
    }

    window.deleteFormation = (e, id) => {
        e.stopPropagation();
        if(confirm("Supprimer définitivement ?")) {
            state.formations = state.formations.filter(f => f.id !== id);
            state.blocs = state.blocs.filter(b => b.formationId !== id);
            save();
        }
    }

    // Navigation de base
    window.showView = (id) => { 
        state.currentView = id; 
        document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
        refreshUI(); 
    };
    window.enterFormation = (id) => { 
        state.currentFormationId = id; 
        const f = state.formations.find(x => x.id === id);
        document.getElementById("formationTitle").textContent = f.name;
        showView("blocsView"); 
    };
    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => document.getElementById(id).classList.add("hidden");
    
    // Gestion affichage dynamique modal
    document.getElementById("formIsTemplate")?.addEventListener('change', (e) => {
        document.getElementById("dateFields").style.display = e.target.value === "true" ? "none" : "block";
    });
</script>
</body>
</html>
