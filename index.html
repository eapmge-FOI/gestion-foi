<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion FOI - Pilotage Haute Visibilité</title>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1;
            /* Couleurs de statut (version pleine pour le texte/bordure, version claire pour le fond) */
            --st-done: #10b981; --st-progress: #f97316; --st-todo: #fbbf24; --st-none: #64748b; --st-alert: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', sans-serif; background:var(--bg1); color:var(--text1); padding: 20px; }
        
        .app { max-width:1200px; margin:auto; }
        header, .mini-header { background:var(--bg2); padding:15px 20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; }

        /* Cartes Session / Bloc */
        .card { background:var(--bg2); padding:18px; border-radius:12px; cursor:pointer; border: 1px solid var(--bg3); position: relative; transition: 0.2s; overflow: hidden; }
        .prog-container { background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; margin: 12px 0; overflow: hidden; }
        .prog-bar { height: 100%; transition: width 0.5s, background-color 0.5s; }

        /* TÂCHES - Nouveau Style Bandeau */
        .task-row { margin-bottom: 8px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.1s; }
        .task-row:hover { transform: translateX(5px); }
        
        .task-main { display: grid; grid-template-columns: 1.5fr 1fr 1fr 100px; align-items: center; padding: 15px 20px; color: #000; font-weight: 600; }
        .task-info small { display: block; opacity: 0.8; font-weight: 400; }
        
        .status-center { display: flex; justify-content: center; }
        .status-select-large { padding: 8px 12px; border-radius: 8px; border: 2px solid rgba(0,0,0,0.2); background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; font-size: 0.9rem; width: 160px; }

        .task-date-end { text-align: right; font-size: 0.85rem; }

        .task-desc { background: rgba(255,255,255,0.95); color: #1e293b; padding: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease-out; }
        .task-desc.open { padding: 15px 20px; max-height: 200px; border-top: 1px dashed #ccc; }

        /* Utilitaires */
        .btn { background:var(--primary); color: white; border:none; padding: 10px 20px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-icon { background: rgba(0,0,0,0.1); border: none; color: inherit; cursor: pointer; padding: 8px; border-radius: 6px; margin-left: 5px; }
        .hidden { display:none !important; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 600px; color: white; }
        input, select, textarea { width:100%; margin: 8px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
        textarea { height: 80px; resize: none; }
    </style>
</head>
<body>

<div class="app" id="mainApp">
    <div id="formationsView">
        <header><h1>🚀 Sessions Actives</h1><button class="btn" onclick="openFormModal(false)">+ Session</button></header>
        <div class="grid" id="activeGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div class="mini-header"><button class="btn" id="backToFormations">← Retour</button><h2 id="formationTitle"></h2><button class="btn" onclick="openModal('blocModal')">+ Bloc</button></div>
        <div class="grid" id="blocsGrid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <div class="mini-header"><button class="btn" onclick="showView('blocsView')">← Retour</button><div id="blocHeaderInfo"></div><button class="btn" onclick="openModal('taskModal')">+ Tâche</button></div>
        <div id="tasksList"></div>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Configuration de la Tâche</h3>
        <label>Titre</label><input id="taskTitle">
        <label>Responsable</label><input id="taskResp">
        <label>Descriptif / Consignes</label><textarea id="taskDescInput" placeholder="Détaillez ici les étapes..."></textarea>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
            <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                <small>DÉBUT (Avant bloc)</small>
                <div style="display:flex; gap:5px"><input type="number" id="taskStartVal" value="4"><select id="taskStartUnit"><option value="days">Jours</option><option value="weeks" selected>Sem.</option><option value="months">Mois</option><option value="years">Années</option></select></div>
            </div>
            <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                <small>FIN (Avant bloc)</small>
                <div style="display:flex; gap:5px"><input type="number" id="taskEndVal" value="2"><select id="taskEndUnit"><option value="days">Jours</option><option value="weeks" selected>Sem.</option><option value="months">Mois</option><option value="years">Années</option></select></div>
            </div>
        </div>
        
        <button class="btn" style="width:100%; margin-top:20px" onclick="saveTask()">Enregistrer la tâche</button>
        <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('taskModal')">Annuler</button>
    </div>
</div>

<script type="module">
    // Simulation de la base de données (Intégration Firebase identique à l'étape précédente)
    let state = { 
        formations: [
            { id: 1, name: "Promotion FOI 2026", type: "apm", start: "2026-01-01", end: "2026-12-31", isTemplate: false }
        ], 
        blocs: [
            { id: 101, formationId: 1, name: "Bloc Technique 1", date: "2026-06-15", r1: "Jean", r2: "Marc", tasks: [
                { id: 1001, title: "Réservation des salles", resp: "Alice", desc: "Contacter le service logistique pour les salles A, B et C. Vérifier le matériel audio.", sVal: 2, sUnit: "months", eVal: 1, eUnit: "months", status: "progress" },
                { id: 1002, title: "Convocation intervenants", resp: "Bob", desc: "Envoyer les mails de confirmation et le planning détaillé.", sVal: 3, sUnit: "weeks", eVal: 2, eUnit: "weeks", status: "todo" }
            ]}
        ], 
        currentFormationId: null, currentBlocId: null, editingId: null 
    };

    // --- LOGIQUE DE CALCUL DES DATES ---
    function getCalcDate(base, val, unit) {
        if(!base) return null;
        let d = new Date(base); val = parseInt(val);
        if(unit === 'days') d.setDate(d.getDate() - val);
        else if(unit === 'weeks') d.setDate(d.getDate() - (val * 7));
        else if(unit === 'months') d.setMonth(d.getMonth() - val);
        else if(unit === 'years') d.setFullYear(d.getFullYear() - val);
        return d;
    }

    function getTaskStatusInfo(task, blocDate) {
        const today = new Date(); today.setHours(0,0,0,0);
        const start = getCalcDate(blocDate, task.sVal, task.sUnit);
        const end = getCalcDate(blocDate, task.eVal, task.eUnit);
        let status = task.status || 'todo';

        if (status !== 'done' && status !== 'progress') {
            if (start && today < start) status = 'not_started';
            else if (start && today >= start && (!end || today < end)) status = 'todo';
        }
        if (status !== 'done') {
            const sevenDaysBeforeEnd = end ? new Date(end.getTime() - (7 * 24 * 60 * 60 * 1000)) : null;
            if (end && today >= end) status = 'alert';
            else if (sevenDaysBeforeEnd && today >= sevenDaysBeforeEnd && status !== 'progress') status = 'alert';
        }

        const map = {
            'done': { label: 'Terminé', color: 'var(--st-done)' },
            'progress': { label: 'En cours', color: 'var(--st-progress)' },
            'todo': { label: 'À faire', color: 'var(--st-todo)' },
            'not_started': { label: 'Pas commencé', color: 'var(--st-none)' },
            'alert': { label: 'RAPPEL ⚠️', color: 'var(--st-alert)' }
        };
        return { ...map[status], id: status, endDateStr: end ? end.toLocaleDateString('fr-FR') : '---' };
    }

    // --- RENDU UI ---
    window.renderTasks = () => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        document.getElementById("tasksList").innerHTML = b.tasks.map(t => {
            const info = getTaskStatusInfo(t, b.date);
            return `
                <div class="task-row">
                    <div class="task-main" style="background: ${info.color}" onclick="toggleDesc(${t.id})">
                        <div class="task-info">
                            <strong>${t.title}</strong>
                            <small>Responsable : ${t.resp || 'Non assigné'}</small>
                        </div>
                        <div class="status-center">
                            <select class="status-select-large" onclick="event.stopPropagation()" onchange="updateTaskStatus(${t.id}, this.value)">
                                <option value="not_started" ${info.id==='not_started'?'selected':''}>Pas commencé</option>
                                <option value="todo" ${info.id==='todo'?'selected':''}>À faire</option>
                                <option value="progress" ${info.id==='progress'?'selected':''}>En cours</option>
                                <option value="done" ${info.id==='done'?'selected':''}>Terminé</option>
                                ${info.id==='alert' ? '<option value="alert" selected>⚠️ RAPPEL</option>' : ''}
                            </select>
                        </div>
                        <div class="task-date-end">
                            Fin : <b>${info.endDateStr}</b>
                        </div>
                        <div style="text-align:right">
                            <button class="btn-icon" onclick="event.stopPropagation(); editTask(${t.id})">✏️</button>
                        </div>
                    </div>
                    <div id="desc-${t.id}" class="task-desc">
                        <p><strong>Description :</strong></p>
                        <p>${t.desc || 'Aucun descriptif fourni.'}</p>
                    </div>
                </div>`;
        }).join("");
    };

    window.toggleDesc = (id) => {
        const el = document.getElementById(`desc-${id}`);
        el.classList.toggle('open');
    };

    window.updateTaskStatus = (tId, newStatus) => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = b.tasks.find(x => x.id === tId);
        t.status = newStatus;
        renderTasks(); // Rafraîchissement local
        // push(); // Activer avec Firebase
    };

    window.saveTask = () => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = { 
            id: state.editingId || Date.now(), 
            title: document.getElementById("taskTitle").value, 
            resp: document.getElementById("taskResp").value, 
            desc: document.getElementById("taskDescInput").value,
            sVal: document.getElementById("taskStartVal").value, 
            sUnit: document.getElementById("taskStartUnit").value, 
            eVal: document.getElementById("taskEndVal").value, 
            eUnit: document.getElementById("taskEndUnit").value, 
            status: state.editingId ? b.tasks.find(x => x.id === state.editingId).status : 'todo' 
        };
        if(state.editingId) b.tasks = b.tasks.map(x => x.id === state.editingId ? t : x);
        else b.tasks.push(t);
        closeModal('taskModal');
        renderTasks();
    };

    // --- FONCTIONS NAVIGATION STANDARDS ---
    window.showView = (id) => { 
        document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
        if(id === 'tasksView') renderTasks();
    };
    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => { document.getElementById(id).classList.add("hidden"); state.editingId = null; };
    window.editTask = (id) => {
        state.editingId = id;
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = b.tasks.find(x => x.id === id);
        document.getElementById("taskTitle").value = t.title;
        document.getElementById("taskResp").value = t.resp;
        document.getElementById("taskDescInput").value = t.desc || "";
        openModal('taskModal');
    };

    // Init
    state.currentFormationId = 1;
    state.currentBlocId = 101;
    showView('tasksView');
    document.getElementById("blocHeaderInfo").innerHTML = "<h2>Bloc Technique 1</h2>";

</script>
</body>
</html>
