<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Gestion FOI - Pilotage 4 Couches</title>
  <style>
    :root{
      --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
      --text1:#f1f5f9; --text2:#cbd5e1;
      --polcant-blue:#334b7a; --apm-gray:#334155; --asp-light:#94a3b8;
      --flag-red:#e11d48; --flag-yellow:#fbbf24;
      --st-done:#059669; --st-progress:#f97316; --st-todo:#fbbf24; --st-none:#94a3b8; --st-alert:#e11d48;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:sans-serif;background:var(--bg1);color:var(--text1);padding:20px;}

    #loginView{height:calc(100vh - 40px);display:flex;align-items:center;justify-content:center;}
    .login-box{background:var(--bg2);padding:40px;border-radius:12px;border:1px solid var(--bg3);text-align:center;width:100%;max-width:420px;}
    .google-btn{background:#fff;color:#444;padding:12px 24px;border-radius:8px;border:none;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin:25px auto;width:100%;}

    /* FULL WIDTH */
    .app{width:100%;max-width:none;margin:0;}
    header,.mini-header{background:var(--bg2);padding:15px 20px;border-radius:12px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--bg3);}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px;}

    .card{background:var(--bg2);padding:18px;border-radius:12px;cursor:pointer;border:1px solid var(--bg3);position:relative;display:flex;flex-direction:column;min-height:150px;transition:.2s;overflow:hidden;}
    .card:hover{border-color:var(--primary);}
    .style-apm{background:var(--apm-gray)!important;padding-top:25px;}
    .style-apm::before{content:'';position:absolute;top:0;left:0;width:100%;height:4px;background:var(--flag-yellow);}
    .style-apm::after{content:'';position:absolute;top:4px;left:0;width:100%;height:4px;background:var(--flag-red);}
    .style-polcant{background:var(--polcant-blue)!important;border-top:5px solid rgba(255,255,255,.2);}
    .style-asp{background:var(--asp-light)!important;color:#0f172a;border-top:5px solid #64748b;}
    .style-asp *{color:#0f172a!important;}

    .alert-badge{background:var(--st-alert);color:#fff;padding:4px 10px;border-radius:6px;font-size:.75rem;font-weight:bold;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.05);opacity:.8;}100%{transform:scale(1);}}

    .prog-container{background:rgba(0,0,0,.3);height:10px;border-radius:5px;margin:12px 0;overflow:hidden;border:1px solid rgba(255,255,255,.1);}
    .prog-bar{height:100%;transition:width .4s, background-color .4s;}

    .btn{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:bold;}
    .btn-icon{background:rgba(0,0,0,.1);border:none;color:inherit;cursor:pointer;padding:7px;border-radius:6px;}

    .filter-bar{
      background:var(--bg2);padding:15px 20px;border-radius:10px;margin-bottom:15px;
      display:grid;grid-template-columns:1fr 1fr 1fr 1.2fr;gap:20px;border:1px solid var(--bg3);
      align-items:end;
    }
    .filter-group{display:flex;flex-direction:column;gap:5px;}
    .filter-group label{font-size:.75rem;text-transform:uppercase;opacity:.7;font-weight:bold;}
    input,select,textarea{width:100%;margin:8px 0 15px 0;padding:10px;background:var(--bg1);border:1px solid var(--bg3);color:#fff;border-radius:6px;}

    .panel{
      background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:15px 20px;margin-bottom:15px;
    }
    .panel h3{font-size:1rem;margin-bottom:10px;}

    .task-container{margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid var(--bg3);}
    .task-bandeau{display:grid;grid-template-columns:1.6fr 1fr .9fr 80px;align-items:center;padding:15px;cursor:pointer;color:#fff;font-weight:bold;}
    .text-dark{color:#1e293b!important;}
    .status-select-large{width:100%;padding:10px;border-radius:8px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.9);color:#000;font-weight:bold;cursor:pointer;font-size:.9rem;}
    .task-desc-area{background:var(--bg3);color:var(--text2);padding:0;max-height:0;overflow:hidden;transition:all .3s ease;}
    .task-desc-area.open{padding:15px;max-height:900px;border-top:1px solid rgba(255,255,255,.1);}

    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;}
    .modal-content{background:var(--bg2);padding:25px;border-radius:12px;width:95%;max-width:550px;overflow-y:auto;max-height:90vh;}

    .hidden{display:none!important;}
    .muted{opacity:.75;}

    /* ---------- DASHBOARD RAPPELS (latéral) ---------- */
    .alerts-toggle{
      position:fixed;
      top:120px;
      right:0;
      background:var(--st-alert);
      color:#fff;
      padding:10px 14px;
      border-radius:10px 0 0 10px;
      cursor:pointer;
      font-weight:800;
      z-index:120;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      user-select:none;
    }
    .alerts-drawer{
      position:fixed;
      top:0;
      right:-360px;
      width:360px;
      height:100%;
      background:var(--bg2);
      border-left:1px solid var(--bg3);
      z-index:119;
      padding:18px 16px;
      transition:right .25s ease;
      overflow-y:auto;
      box-shadow:-10px 0 30px rgba(0,0,0,.35);
    }
    .alerts-drawer.open{ right:0; }
    .alerts-header{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;
    }
    .alerts-item{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      border-radius:12px;
      padding:10px 10px;
      margin-bottom:10px;
    }
    .pill{
      display:inline-block;padding:4px 10px;border-radius:999px;font-size:.75rem;font-weight:bold;
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);
    }
  </style>
</head>
<body>

<div id="loginView">
  <div class="login-box">
    <h2>🔒 Pilotage FOI</h2>
    <button class="google-btn" onclick="handleLogin()">Se connecter avec Google</button>
    <p id="loginError" style="color: var(--st-alert); margin-top:10px"></p>
  </div>
</div>

<!-- DASHBOARD RAPPELS -->
<div class="alerts-toggle hidden" id="alertsToggle" onclick="toggleAlertsDrawer()">⚠️ Rappels <span id="alertsCount" style="opacity:.9"></span></div>
<div class="alerts-drawer" id="alertsDrawer">
  <div class="alerts-header">
    <div style="font-weight:900">⚠️ Rappels (prioritaire)</div>
    <button class="btn-icon" onclick="toggleAlertsDrawer()" title="Fermer">✖</button>
  </div>
  <div id="alertsDrawerContent" class="muted">Aucun rappel</div>
</div>

<div class="app hidden" id="mainApp">
  <div id="formationsView">
    <header>
      <h1>📚 Sessions Actives</h1>
      <div style="display:flex; gap:10px; align-items:center">

        <!-- SETTINGS (⚙️) -->
        <div style="position:relative;">
          <button class="btn-icon" id="settingsBtn" title="Réglages" onclick="toggleSettingsMenu(event)">⚙️</button>
          <div id="settingsMenu" class="hidden" style="
            position:absolute; right:0; top:42px;
            background:var(--bg2); border:1px solid var(--bg3);
            border-radius:10px; padding:10px; width:220px;
            box-shadow:0 10px 30px rgba(0,0,0,.35);
            z-index:50;">
            <button class="btn" style="width:100%; background:#10b981" onclick="exportBackupJSON(); closeSettingsMenu()">💾 Backup JSON</button>
            <button class="btn" style="width:100%; margin-top:8px; background:#0ea5e9" onclick="triggerImport(); closeSettingsMenu()">📥 Import JSON</button>
          </div>
        </div>
        <input id="importFile" type="file" accept="application/json" class="hidden" onchange="importBackupJSON(this.files[0])">

        <!-- Buttons -->
        <button class="btn" style="background:#475569" onclick="showView('templatesListView')">📂 Modèles</button>
        <button class="btn" style="background:#475569" onclick="showView('archivesView')">📦 Archives</button>
        <button class="btn" style="background:var(--st-alert)" onclick="handleLogout()">🚪</button>
      </div>
    </header>

    <!-- GLOBAL FILTERS + SEARCH -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Responsable (global)</label>
        <select id="globalRespFilter" onchange="renderGlobalOrSessions()">
          <option value="all">Tous</option>
        </select>
      </div>
      <div class="filter-group">
        <label>État (global)</label>
        <select id="globalStatusFilter" onchange="renderGlobalOrSessions()">
          <option value="all">Tous</option>
          <option value="alert">⚠️ RAPPELS</option>
          <option value="not_started">Pas commencé</option>
          <option value="todo">À faire</option>
          <option value="progress">En cours</option>
          <option value="done">Terminé</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Corps</label>
        <select id="globalTypeFilter" onchange="renderGlobalOrSessions()">
          <option value="all">Tous</option>
          <option value="apm">APM</option>
          <option value="polcant">PolCant</option>
          <option value="asp">ASP</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Recherche</label>
        <input id="globalSearch" placeholder="Titre, resp, session, module, bloc..." oninput="renderGlobalOrSessions()">
      </div>
    </div>

    <div id="globalTasksList" class="hidden"></div>
    <div class="grid" id="activeGrid"></div>
  </div>

  <div id="archivesView" class="hidden">
    <header><button class="btn" onclick="showView('formationsView')">← Retour</button><h1>📦 Archives</h1><div></div></header>
    <div class="grid" id="archivesGrid"></div>
  </div>

  <div id="templatesListView" class="hidden">
    <header><button class="btn" onclick="showView('formationsView')">← Retour</button><h1>📂 Modèles</h1><button class="btn" onclick="openFormModal(true)">+ Nouveau Modèle</button></header>
    <div class="grid" id="templateGrid"></div>
  </div>

  <div id="modulesView" class="hidden">
    <div class="mini-header">
      <button class="btn" onclick="showView('formationsView')">← Retour</button>
      <h2 id="formationTitle"></h2>
      <button class="btn" onclick="prepareNewModule()">+ Module</button>
    </div>
    <div class="grid" id="modulesGrid"></div>
  </div>

  <div id="blocsView" class="hidden">
    <div class="mini-header">
      <button class="btn" id="backBtn">← Retour</button>
      <h2 id="moduleTitle"></h2>
      <button class="btn" onclick="prepareNewBloc()">+ Bloc</button>
    </div>
    <div class="grid" id="blocsGrid"></div>
  </div>

  <div id="tasksView" class="hidden">
    <div class="mini-header">
      <button class="btn" onclick="showView('blocsView')">← Retour</button>
      <div id="blocHeaderInfo"></div>
      <button class="btn" onclick="prepareNewTask()">+ Tâche</button>
    </div>

    <div class="filter-bar" style="grid-template-columns:1fr 1fr;">
      <div class="filter-group">
        <label>Responsable</label>
        <select id="respFilter" onchange="renderTasks()"><option value="all">Tous</option></select>
      </div>
      <div class="filter-group">
        <label>État</label>
        <select id="statusFilter" onchange="renderTasks()">
          <option value="all">Tous</option>
          <option value="alert">⚠️ RAPPELS</option>
          <option value="not_started">Pas commencé</option>
          <option value="todo">À faire</option>
          <option value="progress">En cours</option>
          <option value="done">Terminé</option>
        </select>
      </div>
    </div>

    <div id="tasksList"></div>
  </div>
</div>

<!-- MODALS -->
<div id="formationModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3 id="formModalTitle">Session</h3>
    <input type="hidden" id="formIsTemplate" />
    <label>Nom</label><input id="formName" />
    <label>Corps</label>
    <select id="formType">
      <option value="apm">APM</option>
      <option value="polcant">PolCant</option>
      <option value="asp">ASP</option>
    </select>

    <div id="dateFields">
      <label>Début (JJ.MM.AAAA)</label><input id="formStart" placeholder="JJ.MM.AAAA" />
      <label>Fin (JJ.MM.AAAA)</label><input id="formEnd" placeholder="JJ.MM.AAAA" />
    </div>

    <button class="btn" style="width:100%" onclick="saveFormation()">Enregistrer</button>
    <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('formationModal')">Annuler</button>
  </div>
</div>

<div id="moduleModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3>Module</h3>
    <label>Nom du Module (Phase)</label><input id="moduleName" />
    <label>Responsable Module</label><input id="moduleResp" placeholder="Nom du responsable" />
    <button class="btn" style="width:100%" onclick="saveModule()">Enregistrer</button>
    <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('moduleModal')">Annuler</button>
  </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3>Bloc</h3>
    <label>Nom</label><input id="blocName" />
    <label>Date de référence (JJ.MM.AAAA)</label><input id="blocDate" placeholder="JJ.MM.AAAA" />
    <div style="display:flex; gap:10px">
      <input id="blocR1" placeholder="Resp 1" />
      <input id="blocR2" placeholder="Resp 2" />
    </div>
    <button class="btn" style="width:100%" onclick="saveBloc()">Enregistrer</button>
    <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('blocModal')">Annuler</button>
  </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
  <div class="modal-content">
    <h3>Réglages Tâche</h3>
    <label>Titre</label><input id="taskTitle" />
    <label>Responsable</label><input id="taskResp" />
    <label>Instructions (Modèle)</label><textarea id="taskDesc" style="height:60px"></textarea>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-top:10px">
      <div>
        <small>DÉBUT (-)</small><input type="number" id="taskStartVal" value="4" />
        <select id="taskStartUnit">
          <option value="days">Jours</option>
          <option value="weeks" selected>Semaines</option>
          <option value="months">Mois</option>
          <option value="years">Années</option>
        </select>
      </div>
      <div>
        <small>FIN (-)</small><input type="number" id="taskEndVal" value="2" />
        <select id="taskEndUnit">
          <option value="days">Jours</option>
          <option value="weeks" selected>Semaines</option>
          <option value="months">Mois</option>
          <option value="years">Années</option>
        </select>
      </div>
    </div>

    <button class="btn" style="width:100%; margin-top:15px" onclick="saveTask()">Enregistrer</button>
    <button class="btn" style="width:100%; margin-top:10px; background:var(--bg3)" onclick="closeModal('taskModal')">Annuler</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE",
    authDomain: "gestion-des-taches-foi.firebaseapp.com",
    projectId: "gestion-des-taches-foi",
    storageBucket: "gestion-des-taches-foi.firebasestorage.app",
    messagingSenderId: "538286716668",
    appId: "1:538286716668:web:b86f8d5f606c78494f4979"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const ALLOWED = ["eapmge@gmail.com", "mentors.foi@gmail.com"];

  // ---------- STATE ----------
  let state = {
    formations: [],
    modules: [],
    blocs: [],
    currentFormationId: null,
    currentModuleId: null,
    currentBlocId: null,
    editingId: null,
    currentView: "formationsView",
    lastParentView: "formationsView",
    openTaskIds: new Set(), // ✅ FIX : mémorise les tâches ouvertes (évite fermeture pendant saisie)
  };

  function generateId() {
    try { return crypto.randomUUID(); }
    catch (e) { return Date.now().toString(36) + Math.floor(Math.random()*100000).toString(36); }
  }
  function escId(v) { return String(v).replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }

  // ---------- DATE HELPERS (EU) ----------
  function isoToEU(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return "";
    const day = String(d.getDate()).padStart(2, "0");
    const month = String(d.getMonth() + 1).padStart(2, "0");
    const year = d.getFullYear();
    return `${day}.${month}.${year}`;
  }
  function euToISO(eu) {
    if (!eu) return "";
    const parts = eu.split(".");
    if (parts.length !== 3) return "";
    const [dd, mm, yyyy] = parts.map(x => x.trim());
    if (!dd || !mm || !yyyy) return "";
    return `${yyyy}-${mm.padStart(2,"0")}-${dd.padStart(2,"0")}`;
  }
  function isValidEUDate(eu) {
    const iso = euToISO(eu);
    if (!iso) return false;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return false;
    const [yyyy, mm, dd] = iso.split("-").map(n => parseInt(n, 10));
    return d.getFullYear() === yyyy && (d.getMonth() + 1) === mm && d.getDate() === dd;
  }

  // ---------- PROGRESS COLOR (uniform color based on %) ----------
  function progressColor(p) {
    const x = Math.max(0, Math.min(100, Number(p) || 0));
    const c1 = { r: 239, g: 68,  b: 68  };  // red
    const c2 = { r: 249, g: 115, b: 22  };  // orange
    const c3 = { r: 34,  g: 197, b: 94  };  // green
    let a, b, t;
    if (x <= 50) { a = c1; b = c2; t = x / 50; }
    else { a = c2; b = c3; t = (x - 50) / 50; }
    const r = Math.round(a.r + (b.r - a.r) * t);
    const g = Math.round(a.g + (b.g - a.g) * t);
    const bl = Math.round(a.b + (b.b - a.b) * t);
    return `rgb(${r},${g},${bl})`;
  }

  // ---------- AUTH ----------
  window.handleLogin = () => {
    signInWithPopup(auth, provider).catch(e => {
      document.getElementById("loginError").textContent = e.message;
    });
  };
  window.handleLogout = () => signOut(auth);

  onAuthStateChanged(auth, (u) => {
    if (u && ALLOWED.includes(u.email)) {
      document.getElementById("loginError").textContent = "";
      document.getElementById("loginView").classList.add("hidden");
      document.getElementById("mainApp").classList.remove("hidden");
      startSync();
    } else {
      if (u && !ALLOWED.includes(u.email)) {
        document.getElementById("loginError").textContent = `Accès refusé pour ${u.email}`;
        signOut(auth);
      }
      document.getElementById("loginView").classList.remove("hidden");
      document.getElementById("mainApp").classList.add("hidden");
    }
  });

  // ---------- FIRESTORE SYNC ----------
  function startSync() {
    onSnapshot(doc(db, "data", "appState"), (s) => {
      if (s.exists()) {
        const d = s.data() || {};
        state.formations = d.formations || [];
        state.modules = d.modules || [];
        state.blocs = d.blocs || [];
        refreshUI(); // ✅ re-render OK : tâches ouvertes seront restaurées
      } else {
        setDoc(doc(db, "data", "appState"), { formations: [], modules: [], blocs: [] });
      }
    }, (err) => console.error("snapshot error", err));
  }
  async function push() {
    await setDoc(doc(db, "data", "appState"), {
      formations: state.formations,
      modules: state.modules,
      blocs: state.blocs,
    });
  }

  // ---------- DATE CALCS & STATUS ----------
  function getCalcDate(baseISO, val, unit) {
    if (!baseISO) return null;
    let d = new Date(baseISO);
    val = parseInt(val) || 0;
    if (unit === "days") d.setDate(d.getDate() - val);
    else if (unit === "weeks") d.setDate(d.getDate() - val * 7);
    else if (unit === "months") d.setMonth(d.getMonth() - val);
    else if (unit === "years") d.setFullYear(d.getFullYear() - val);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function getTaskStatusInfo(task, blocDateISO) {
    const today = new Date(); today.setHours(0,0,0,0);
    const start = getCalcDate(blocDateISO, task.sVal, task.sUnit);
    const end = getCalcDate(blocDateISO, task.eVal, task.eUnit);
    let status = task.status || "todo";

    if (status === "todo" || status === "not_started") {
      if (start && today < start) status = "not_started";
      else if (start && today >= start && (!end || today < end)) status = "todo";
    }
    if (status !== "done" && status !== "progress") {
      const sevenDays = 7 * 24 * 60 * 60 * 1000;
      if (end && today >= end) status = "alert";
      else if (end && (end - today) <= sevenDays) status = "alert";
    }

    const map = {
      alert: { rank: 1, color: "var(--st-alert)", dark: false },
      todo: { rank: 2, color: "var(--st-todo)", dark: true },
      progress: { rank: 3, color: "var(--st-progress)", dark: false },
      not_started: { rank: 4, color: "var(--st-none)", dark: true },
      done: { rank: 5, color: "var(--st-done)", dark: false },
    };
    const info = map[status] || map.todo;
    const startISO = start ? start.toISOString().split("T")[0] : "";
    const endISO = end ? end.toISOString().split("T")[0] : "";
    return { ...info, id: status, startStr: start ? isoToEU(startISO) : "---", endStr: end ? isoToEU(endISO) : "---" };
  }

  // ---------- RELATION HELPERS ----------
  function formationModules(formationId) { return state.modules.filter(m => m.formationId === formationId); }
  function moduleBlocs(moduleId) { return state.blocs.filter(b => b.moduleId === moduleId); }
  function formationAllBlocs(formationId) { return formationModules(formationId).flatMap(m => moduleBlocs(m.id)); }
  function isArchived(f) { return f.end && new Date(f.end) < new Date(); }
  function getBlocContext(bloc) {
    const mod = state.modules.find(m => m.id === bloc.moduleId);
    const form = mod ? state.formations.find(f => f.id === mod.formationId) : null;
    return { module: mod, formation: form };
  }

  // ---------- GLOBAL FILTER LIST ----------
  function updateGlobalFilterList() {
    const sel = document.getElementById("globalRespFilter");
    if (!sel) return;
    const current = sel.value || "all";
    const names = new Set();
    state.blocs.forEach(b => (b.tasks || []).forEach(t => { if (t.resp && String(t.resp).trim()) names.add(String(t.resp).trim()); }));
    const sorted = [...names].sort((a,b) => a.localeCompare(b,'fr'));
    sel.innerHTML = `<option value="all">Tous</option>` + sorted.map(n => `<option value="${n}" ${current===n?'selected':''}>${n}</option>`).join("");
  }

  // ---------- ALERTS DRAWER ----------
  window.toggleAlertsDrawer = () => {
    const drawer = document.getElementById("alertsDrawer");
    if (!drawer) return;
    drawer.classList.toggle("open");
  };

  function renderAlertsDrawer({ resp, typ, q }) {
    const toggle = document.getElementById("alertsToggle");
    const countEl = document.getElementById("alertsCount");
    const box = document.getElementById("alertsDrawerContent");
    if (!toggle || !countEl || !box) return;

    const query = (q || "").trim().toLowerCase();

    const rows = [];
    state.blocs.forEach(b => {
      const ctx = getBlocContext(b);
      if (!ctx.formation || ctx.formation.isTemplate) return;
      if (isArchived(ctx.formation)) return;
      if (typ !== "all" && ctx.formation.type !== typ) return;

      (b.tasks || []).forEach(t => {
        const info = getTaskStatusInfo(t, b.date);
        if (info.id !== "alert") return;
        if (resp !== "all" && (t.resp || "") !== resp) return;

        const hay = `${t.title||""} ${t.resp||""} ${ctx.formation.name||""} ${ctx.module?.name||""} ${b.name||""}`.toLowerCase();
        if (query && !hay.includes(query)) return;

        rows.push({
          endStr: info.endStr,
          startStr: info.startStr,
          title: t.title || "Sans titre",
          resp: t.resp || "?",
          formation: ctx.formation?.name || "—",
          module: ctx.module?.name || "—",
          bloc: b.name || "—",
        });
      });
    });

    rows.sort((a,b) => a.endStr.localeCompare(b.endStr));

    toggle.classList.remove("hidden");
    countEl.textContent = rows.length ? `(${rows.length})` : "";

    if (!rows.length) {
      box.innerHTML = `<div class="muted">Aucun rappel avec ces filtres.</div>`;
      return;
    }

    box.innerHTML = rows.map(r => `
      <div class="alerts-item">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
          <div style="font-weight:900">${r.title}</div>
          <span class="pill" style="background: rgba(225,29,72,.18); border-color: rgba(225,29,72,.35);">⚠️ ${r.endStr}</span>
        </div>
        <div class="muted" style="margin-top:6px;font-size:.85rem">
          Resp: <span class="pill">${r.resp}</span>
        </div>
        <div class="muted" style="margin-top:6px;font-size:.85rem">
          ${r.formation} → ${r.module} → ${r.bloc}
        </div>
        <div class="muted" style="margin-top:6px;font-size:.85rem">Début: ${r.startStr}</div>
      </div>
    `).join("");
  }

  // ---------- GLOBAL RENDER (sessions grid or global tasks) ----------
  window.renderGlobalOrSessions = () => {
    const resp = document.getElementById("globalRespFilter")?.value || "all";
    const stat = document.getElementById("globalStatusFilter")?.value || "all";
    const typ  = document.getElementById("globalTypeFilter")?.value || "all";
    const q    = document.getElementById("globalSearch")?.value || "";
    const query = q.trim().toLowerCase();

    // ✅ Drawer rappels (compact)
    renderAlertsDrawer({ resp, typ, q });

    const wantsGlobal = (resp !== "all" || stat !== "all");

    const globalBox = document.getElementById("globalTasksList");
    const grid = document.getElementById("activeGrid");
    if (!globalBox || !grid) return;

    if (!wantsGlobal) {
      globalBox.classList.add("hidden");
      grid.classList.remove("hidden");

      const list = state.formations.filter(f =>
        !f.isTemplate &&
        !isArchived(f) &&
        (typ === "all" || f.type === typ) &&
        (!query || (String(f.name||"").toLowerCase().includes(query)))
      );

      renderMainGrid("activeGrid", list, false);
      return;
    }

    const rows = [];
    state.blocs.forEach(b => {
      const ctx = getBlocContext(b);
      if (!ctx.formation || ctx.formation.isTemplate) return;
      if (isArchived(ctx.formation)) return;
      if (typ !== "all" && ctx.formation.type !== typ) return;

      (b.tasks || []).forEach(t => {
        const info = getTaskStatusInfo(t, b.date);
        if (resp !== "all" && (t.resp || "") !== resp) return;
        if (stat !== "all" && info.id !== stat) return;

        const hay = `${t.title||""} ${t.resp||""} ${ctx.formation.name||""} ${ctx.module?.name||""} ${b.name||""}`.toLowerCase();
        if (query && !hay.includes(query)) return;

        rows.push({
          rank: info.rank, color: info.color, dark: info.dark, status: info.id,
          startStr: info.startStr, endStr: info.endStr,
          title: t.title || "Sans titre", resp: t.resp || "?",
          formation: ctx.formation?.name || "—",
          module: ctx.module?.name || "—",
          bloc: b.name || "—",
        });
      });
    });

    rows.sort((a,b) => a.rank - b.rank);

    grid.classList.add("hidden");
    globalBox.classList.remove("hidden");

    globalBox.innerHTML = rows.length ? rows.map(r => `
      <div class="task-container">
        <div class="task-bandeau ${r.dark ? "text-dark" : ""}" style="background:${r.color}; grid-template-columns: 1.8fr 1fr 1fr 60px;">
          <div>
            <div style="font-size: 1.05rem">${r.title}</div>
            <div style="font-size: 0.8rem; opacity: 0.9">Resp: ${r.resp}</div>
            <div style="font-size: 0.75rem; font-weight: normal; margin-top:3px">${r.formation} → ${r.module} → ${r.bloc}</div>
          </div>
          <div style="font-size:0.85rem">Début: <b>${r.startStr}</b></div>
          <div style="font-size:0.85rem; text-align:center">Échéance:<br><b>${r.endStr}</b></div>
          <div style="text-align:right; opacity:0.9">${r.status === "alert" ? "⚠️" : ""}</div>
        </div>
      </div>
    `).join("") : `<div style="text-align:center; padding:30px; opacity:0.5">Aucune tâche pour ces filtres</div>`;
  };

  // ---------- UI / RENDER ----------
  window.refreshUI = () => {
    if (state.currentView === "formationsView") {
      updateGlobalFilterList();
      renderGlobalOrSessions();
    }
    if (state.currentView === "archivesView") renderMainGrid("archivesGrid", state.formations.filter(f => !f.isTemplate && isArchived(f)), true);
    if (state.currentView === "templatesListView") renderMainGrid("templateGrid", state.formations.filter(f => f.isTemplate), false);
    if (state.currentView === "modulesView") renderModules();
    if (state.currentView === "blocsView") renderBlocs();
    if (state.currentView === "tasksView") { updateFilterList(); renderTasks(); }
  };

  function renderMainGrid(elId, list, isArchive = false) {
    const sorted = [...list].sort((a,b) => new Date(a.start || 0) - new Date(b.start || 0));
    document.getElementById(elId).innerHTML = sorted.map(f => {
      const fBlocs = formationAllBlocs(f.id);
      const allT = fBlocs.flatMap(b => b.tasks || []);
      const hasAlert = fBlocs.some(b => (b.tasks || []).some(t => getTaskStatusInfo(t, b.date).id === "alert"));
      const doneCount = allT.filter(t => t.status === "done").length;
      const prog = allT.length ? Math.round((doneCount / allT.length) * 100) : 0;

      return `
        <div class="card style-${f.type}" onclick="enterFormation('${escId(f.id)}')">
          <div style="display:flex; justify-content:space-between">
            <h3>${f.name}</h3>
            ${hasAlert && !isArchive && !f.isTemplate ? '<span class="alert-badge">RAPPEL</span>' : ''}
          </div>
          <p style="font-size:0.8rem; margin-top:5px; opacity:0.8">
            📅 ${f.start ? isoToEU(f.start) : (f.isTemplate ? 'Modèle' : '?')}
          </p>
          <div class="prog-container">
            <div class="prog-bar" style="width:${prog}%; background-color:${progressColor(prog)}"></div>
          </div>
          <div style="display:flex; gap:5px; margin-top:auto">
            ${f.isTemplate ? `<button class="btn" style="background:var(--st-done); font-size:0.7rem" onclick="event.stopPropagation(); deployTemplate('${escId(f.id)}')">🚀 Déployer</button>` : ''}
            <button class="btn-icon" onclick="event.stopPropagation(); editForm('${escId(f.id)}')">✏️</button>
            <button class="btn-icon" onclick="event.stopPropagation(); deleteForm('${escId(f.id)}')">🗑️</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function isCurrentFormationTemplate() {
    const f = state.formations.find(x => x.id === state.currentFormationId);
    return !!(f && f.isTemplate);
  }

  function renderModules() {
    const list = state.modules.filter(m => m.formationId === state.currentFormationId);
    const sorted = [...list].sort((a,b) => (a.name||"").localeCompare(b.name||""));
    const showClone = isCurrentFormationTemplate();

    document.getElementById("modulesGrid").innerHTML = sorted.map(m => {
      const mBlocs = moduleBlocs(m.id);
      const allT = mBlocs.flatMap(b => b.tasks || []);
      const hasAlert = mBlocs.some(b => (b.tasks || []).some(t => getTaskStatusInfo(t, b.date).id === "alert"));
      const prog = allT.length ? Math.round((allT.filter(t => t.status === "done").length / allT.length) * 100) : 0;

      return `
        <div class="card" onclick="enterModule('${escId(m.id)}')">
          <div style="display:flex; justify-content:space-between">
            <h3>${m.name}</h3>
            ${hasAlert ? '<span class="alert-badge">!</span>' : ''}
          </div>
          <p style="opacity:0.8">👤 Resp: ${m.resp || '?'}</p>
          <div class="prog-container">
            <div class="prog-bar" style="width:${prog}%; background-color:${progressColor(prog)}"></div>
          </div>
          <div style="display:flex; gap:5px; margin-top:auto">
            <button class="btn-icon" onclick="event.stopPropagation(); editModule('${escId(m.id)}')">✏️</button>
            ${showClone ? `<button class="btn-icon" title="Dupliquer module" onclick="event.stopPropagation(); cloneModule('${escId(m.id)}')">📄</button>` : ``}
            <button class="btn-icon" onclick="event.stopPropagation(); deleteModule('${escId(m.id)}')">🗑️</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderBlocs() {
    const list = state.blocs.filter(b => b.moduleId === state.currentModuleId);
    const sorted = [...list].sort((a,b) => new Date(a.date || 0) - new Date(b.date || 0));
    const showClone = isCurrentFormationTemplate();

    document.getElementById("blocsGrid").innerHTML = sorted.map(b => {
      const hasAlert = (b.tasks || []).some(t => getTaskStatusInfo(t, b.date).id === "alert");
      const prog = (b.tasks || []).length ? Math.round((b.tasks.filter(t => t.status === "done").length / b.tasks.length) * 100) : 0;

      return `
        <div class="card" onclick="enterBloc('${escId(b.id)}')">
          <div style="display:flex; justify-content:space-between">
            <h3>${b.name}</h3>
            ${hasAlert ? '<span class="alert-badge">!</span>' : ''}
          </div>
          <p>📅 ${b.date ? isoToEU(b.date) : 'Non définie'}</p>
          <div class="prog-container">
            <div class="prog-bar" style="width:${prog}%; background-color:${progressColor(prog)}"></div>
          </div>
          <div style="display:flex; gap:5px; margin-top:auto">
            <button class="btn-icon" onclick="event.stopPropagation(); editBloc('${escId(b.id)}')">✏️</button>
            ${showClone ? `<button class="btn-icon" title="Dupliquer bloc" onclick="event.stopPropagation(); cloneBloc('${escId(b.id)}')">📄</button>` : ``}
            <button class="btn-icon" onclick="event.stopPropagation(); deleteBloc('${escId(b.id)}')">🗑️</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function updateFilterList() {
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b) return;
    const select = document.getElementById("respFilter");
    const currentVal = select.value;
    const names = [...new Set((b.tasks || []).map(t => t.resp).filter(n => n && n.trim() !== ""))].sort();
    let html = '<option value="all">Tous</option>';
    names.forEach(n => { html += `<option value="${n}" ${currentVal === n ? "selected" : ""}>${n}</option>`; });
    select.innerHTML = html;
  }

  // ✅ Inline remark debounce (ne ferme plus grâce à openTaskIds)
  let remarkTimers = {};
  window.updateTaskRemark = (taskId, value) => {
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b || !b.tasks) return;
    const t = b.tasks.find(x => x.id === taskId);
    if (!t) return;
    t.remarque = value;

    if (remarkTimers[taskId]) clearTimeout(remarkTimers[taskId]);
    remarkTimers[taskId] = setTimeout(() => {
      push();
      delete remarkTimers[taskId];
    }, 600);
  };
  window.saveTaskRemarkNow = (taskId) => {
    push();
  };

  window.renderTasks = () => {
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b) {
      document.getElementById("tasksList").innerHTML = `<div style="text-align:center; padding:30px; opacity:0.5">Aucun bloc sélectionné</div>`;
      return;
    }

    const filterResp = document.getElementById("respFilter").value;
    const filterStatus = document.getElementById("statusFilter").value;

    const tasksToRender = (b.tasks || [])
      .filter(t => {
        const info = getTaskStatusInfo(t, b.date);
        return (filterResp === "all" || t.resp === filterResp) && (filterStatus === "all" || info.id === filterStatus);
      })
      .sort((t1, t2) => getTaskStatusInfo(t1, b.date).rank - getTaskStatusInfo(t2, b.date).rank);

    document.getElementById("tasksList").innerHTML = tasksToRender.map(t => {
      const info = getTaskStatusInfo(t, b.date);
      const isOpen = state.openTaskIds.has(String(t.id));
      return `
        <div class="task-container">
          <div class="task-bandeau ${info.dark ? "text-dark" : ""}" style="background:${info.color}" onclick="toggleDesc('${escId(t.id)}')">
            <div>
              <div style="font-size: 1.05rem">${t.title}</div>
              <div style="font-size: 0.8rem; opacity: 0.9">Resp: ${t.resp || "?"}</div>
              <div style="font-size: 0.75rem; font-weight: normal; margin-top:3px">Début : ${info.startStr}</div>
            </div>
            <div>
              <select class="status-select-large" onclick="event.stopPropagation()" onchange="updateTaskStatus('${escId(t.id)}', this.value)">
                <option value="not_started" ${info.id==="not_started" ? "selected" : ""}>Pas commencé</option>
                <option value="todo" ${info.id==="todo" ? "selected" : ""}>À faire</option>
                <option value="progress" ${info.id==="progress" ? "selected" : ""}>En cours</option>
                <option value="done" ${info.id==="done" ? "selected" : ""}>Terminé</option>
                ${info.id==="alert" ? '<option value="alert" selected>⚠️ RAPPEL</option>' : ""}
              </select>
            </div>
            <div style="font-size: 0.85rem; text-align: center">Échéance : <br>${info.endStr}</div>
            <div style="text-align:right">
              <button class="btn-icon" onclick="event.stopPropagation(); editTask('${escId(t.id)}')">✏️</button>
            </div>
          </div>

          <div id="desc-${t.id}" class="task-desc-area ${isOpen ? "open" : ""}">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px">
              <div><strong>Instructions :</strong><br>${t.desc || "Aucune."}</div>

              <div style="border-left:1px solid rgba(255,255,255,.1); padding-left:20px">
                <strong>Remarques / Suivi :</strong><br>
                <textarea
                  style="height:80px; margin-top:8px"
                  placeholder="Écrire ici les remarques d'avancement..."
                  onclick="event.stopPropagation()"
                  oninput="updateTaskRemark('${escId(t.id)}', this.value)"
                >${t.remarque || ""}</textarea>

                <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:6px">
                  <button class="btn" style="padding:6px 10px; font-size:0.8rem"
                    onclick="event.stopPropagation(); saveTaskRemarkNow('${escId(t.id)}')">
                    Enregistrer
                  </button>
                </div>
              </div>
            </div>

            <div style="margin-top:10px; text-align:right">
              <button class="btn" style="background:#e11d48; padding:4px 8px; font-size:0.7rem" onclick="deleteTask('${escId(t.id)}')">Supprimer</button>
            </div>
          </div>
        </div>
      `;
    }).join("") || `<div style="text-align:center; padding:30px; opacity:0.5">Aucune tâche</div>`;
  };

  // ---------- MODALS ----------
  window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
  window.closeModal = (id) => { document.getElementById(id).classList.add("hidden"); state.editingId = null; };

  window.openFormModal = (tpl) => {
    state.editingId = null;
    document.getElementById("formIsTemplate").value = tpl ? "true" : "false";
    document.getElementById("formName").value = "";
    document.getElementById("formType").value = "apm";
    document.getElementById("formStart").value = "";
    document.getElementById("formEnd").value = "";
    document.getElementById("dateFields").style.display = tpl ? "none" : "block";
    document.getElementById("formModalTitle").textContent = tpl ? "Nouveau Modèle" : "Nouvelle Session";
    openModal("formationModal");
  };

  window.prepareNewModule = () => { state.editingId = null; document.getElementById("moduleName").value=""; document.getElementById("moduleResp").value=""; openModal("moduleModal"); };
  window.prepareNewBloc = () => { state.editingId = null; document.getElementById("blocName").value=""; document.getElementById("blocDate").value=""; document.getElementById("blocR1").value=""; document.getElementById("blocR2").value=""; openModal("blocModal"); };
  window.prepareNewTask = () => {
    state.editingId = null;
    document.getElementById("taskTitle").value = "";
    document.getElementById("taskResp").value = "";
    document.getElementById("taskDesc").value = "";
    document.getElementById("taskStartVal").value = 4;
    document.getElementById("taskStartUnit").value = "weeks";
    document.getElementById("taskEndVal").value = 2;
    document.getElementById("taskEndUnit").value = "weeks";
    openModal("taskModal");
  };

  // ---------- EDIT ----------
  window.editForm = (id) => {
    state.editingId = id;
    const f = state.formations.find(x => x.id === id);
    if (!f) return alert("Session/Modèle introuvable");
    document.getElementById("formIsTemplate").value = f.isTemplate ? "true" : "false";
    document.getElementById("formName").value = f.name || "";
    document.getElementById("formType").value = f.type || "apm";
    document.getElementById("formStart").value = f.start ? isoToEU(f.start) : "";
    document.getElementById("formEnd").value = f.end ? isoToEU(f.end) : "";
    document.getElementById("dateFields").style.display = f.isTemplate ? "none" : "block";
    document.getElementById("formModalTitle").textContent = f.isTemplate ? "Modifier Modèle" : "Modifier Session";
    openModal("formationModal");
  };

  window.editModule = (id) => {
    state.editingId = id;
    const m = state.modules.find(x => x.id === id);
    if (!m) return alert("Module introuvable");
    document.getElementById("moduleName").value = m.name || "";
    document.getElementById("moduleResp").value = m.resp || "";
    openModal("moduleModal");
  };

  window.editBloc = (id) => {
    state.editingId = id;
    const b = state.blocs.find(x => x.id === id);
    if (!b) return alert("Bloc introuvable");
    document.getElementById("blocName").value = b.name || "";
    document.getElementById("blocDate").value = b.date ? isoToEU(b.date) : "";
    document.getElementById("blocR1").value = b.r1 || "";
    document.getElementById("blocR2").value = b.r2 || "";
    openModal("blocModal");
  };

  window.editTask = (id) => {
    state.editingId = id;
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b) return alert("Bloc introuvable");
    const t = (b.tasks || []).find(x => x.id === id);
    if (!t) return alert("Tâche introuvable");
    document.getElementById("taskTitle").value = t.title || "";
    document.getElementById("taskResp").value = t.resp || "";
    document.getElementById("taskDesc").value = t.desc || "";
    document.getElementById("taskStartVal").value = t.sVal ?? 4;
    document.getElementById("taskStartUnit").value = t.sUnit || "weeks";
    document.getElementById("taskEndVal").value = t.eVal ?? 2;
    document.getElementById("taskEndUnit").value = t.eUnit || "weeks";
    openModal("taskModal");
  };

  // ---------- SAVE ----------
  window.saveFormation = () => {
    const isTpl = document.getElementById("formIsTemplate").value === "true";
    const name = document.getElementById("formName").value || "Sans nom";
    const type = document.getElementById("formType").value || "apm";
    const startEU = document.getElementById("formStart").value || "";
    const endEU = document.getElementById("formEnd").value || "";

    if (!isTpl) {
      if (!isValidEUDate(startEU) || !isValidEUDate(endEU)) {
        alert("Dates invalides. Format attendu : JJ.MM.AAAA");
        return;
      }
      const startISO = euToISO(startEU);
      const endISO = euToISO(endEU);
      if (new Date(endISO) < new Date(startISO)) {
        alert("La date de fin ne peut pas être avant la date de début.");
        return;
      }
    }

    const d = {
      id: state.editingId || generateId(),
      name,
      type,
      isTemplate: isTpl,
      start: isTpl ? "" : euToISO(startEU),
      end: isTpl ? "" : euToISO(endEU)
    };

    if (state.editingId) state.formations = state.formations.map(f => f.id === state.editingId ? d : f);
    else state.formations.push(d);

    push();
    closeModal("formationModal");
  };

  window.saveModule = () => {
    if (!state.currentFormationId) return alert("Sélectionner une session avant de créer un module.");
    const d = {
      id: state.editingId || generateId(),
      formationId: state.currentFormationId,
      name: document.getElementById("moduleName").value || "Sans nom",
      resp: document.getElementById("moduleResp").value || ""
    };
    if (state.editingId) state.modules = state.modules.map(m => m.id === state.editingId ? d : m);
    else state.modules.push(d);
    push(); closeModal("moduleModal");
  };

  window.saveBloc = () => {
    if (!state.currentModuleId) return alert("Sélectionner un module avant de créer un bloc.");
    const name = document.getElementById("blocName").value || "Sans nom";
    const dateEU = document.getElementById("blocDate").value || "";
    if (dateEU && !isValidEUDate(dateEU)) {
      alert("Date de bloc invalide. Format attendu : JJ.MM.AAAA");
      return;
    }

    const old = state.editingId ? state.blocs.find(x => x.id === state.editingId) : { tasks: [] };
    const d = {
      id: state.editingId || generateId(),
      moduleId: state.currentModuleId,
      name,
      date: dateEU ? euToISO(dateEU) : "",
      r1: document.getElementById("blocR1").value || "",
      r2: document.getElementById("blocR2").value || "",
      tasks: [...(old.tasks || [])]
    };

    if (state.editingId) state.blocs = state.blocs.map(b => b.id === state.editingId ? d : b);
    else state.blocs.push(d);

    push();
    closeModal("blocModal");
  };

  window.saveTask = () => {
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b) return alert("Sélectionner un bloc avant de créer une tâche.");

    const existing = state.editingId ? (b.tasks || []).find(x => x.id === state.editingId) : null;

    const t = {
      id: state.editingId || generateId(),
      title: document.getElementById("taskTitle").value || "Sans titre",
      resp: document.getElementById("taskResp").value || "",
      desc: document.getElementById("taskDesc").value || "",
      remarque: existing ? (existing.remarque || "") : "",
      sVal: document.getElementById("taskStartVal").value || 0,
      sUnit: document.getElementById("taskStartUnit").value || "weeks",
      eVal: document.getElementById("taskEndVal").value || 0,
      eUnit: document.getElementById("taskEndUnit").value || "weeks",
      status: existing ? (existing.status || "todo") : "todo"
    };

    if (state.editingId) b.tasks = (b.tasks || []).map(x => x.id === state.editingId ? t : x);
    else { if (!b.tasks) b.tasks = []; b.tasks.push(t); }

    push();
    closeModal("taskModal");
  };

  // ---------- TEMPLATE DEPLOY (EU dates) ----------
  window.deployTemplate = (tplId) => {
    const tpl = state.formations.find(f => f.id === tplId);
    if (!tpl) return alert("Modèle introuvable");

    const name = prompt("Nom de la nouvelle session ?", tpl.name);
    if (!name || !name.trim()) return;

    const startEU = prompt("Date de début (JJ.MM.AAAA) ?", "");
    if (!startEU || !isValidEUDate(startEU)) {
      alert("Date invalide. Format attendu : JJ.MM.AAAA (ex: 15.03.2026)");
      return;
    }

    const endEU = prompt("Date de fin (JJ.MM.AAAA) ?", "");
    if (!endEU || !isValidEUDate(endEU)) {
      alert("Date invalide. Format attendu : JJ.MM.AAAA (ex: 30.06.2026)");
      return;
    }

    const start = euToISO(startEU);
    const end = euToISO(endEU);
    if (new Date(end) < new Date(start)) {
      alert("La date de fin ne peut pas être avant la date de début.");
      return;
    }

    const newFormId = generateId();
    const newForm = { ...tpl, id: newFormId, name: name.trim(), isTemplate: false, start, end };
    state.formations.push(newForm);

    const tplModules = state.modules.filter(m => m.formationId === tplId);
    tplModules.forEach(m => {
      const newMId = generateId();
      state.modules.push({ ...m, id: newMId, formationId: newFormId });

      const tplBlocs = state.blocs.filter(b => b.moduleId === m.id);
      tplBlocs.forEach(b => {
        const newBlocId = generateId();
        const newTasks = (b.tasks || []).map(t => ({ ...t, id: generateId(), status: "todo", remarque: "" }));
        state.blocs.push({ ...b, id: newBlocId, moduleId: newMId, date: "", tasks: newTasks });
      });
    });

    push();
    showView("formationsView");
    alert("Session déployée ✅");
  };

  // ---------- DUPLICATION (ONLY in templates) ----------
  window.cloneModule = (moduleId) => {
    const m = state.modules.find(x => x.id === moduleId);
    if (!m) return alert("Module introuvable");
    if (!isCurrentFormationTemplate()) return;

    const newName = prompt("Nom du module dupliqué ?", (m.name || "Module") + " (copie)");
    if (!newName) return;

    const newMId = generateId();
    state.modules.push({ ...m, id: newMId, name: newName });

    const blocs = state.blocs.filter(b => b.moduleId === moduleId);
    blocs.forEach(b => {
      const newBId = generateId();
      const newTasks = (b.tasks || []).map(t => ({ ...t, id: generateId() }));
      state.blocs.push({ ...b, id: newBId, moduleId: newMId, name: (b.name || "Bloc") + " (copie)", tasks: newTasks });
    });

    push();
    refreshUI();
  };

  window.cloneBloc = (blocId) => {
    const b = state.blocs.find(x => x.id === blocId);
    if (!b) return alert("Bloc introuvable");
    if (!isCurrentFormationTemplate()) return;

    const newName = prompt("Nom du bloc dupliqué ?", (b.name || "Bloc") + " (copie)");
    if (!newName) return;

    const newBId = generateId();
    const newTasks = (b.tasks || []).map(t => ({ ...t, id: generateId() }));
    state.blocs.push({ ...b, id: newBId, name: newName, tasks: newTasks });

    push();
    refreshUI();
  };

  // ---------- STATUS / TOGGLE / DELETE ----------
  window.updateTaskStatus = (tId, newStat) => {
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b) return;
    const t = (b.tasks || []).find(x => x.id === tId);
    if (t) { t.status = newStat; push(); }
  };

  // ✅ FIX : toggle + mémorisation (évite fermeture au re-render)
  window.toggleDesc = (id) => {
    const key = String(id);
    if (state.openTaskIds.has(key)) state.openTaskIds.delete(key);
    else state.openTaskIds.add(key);

    const el = document.getElementById(`desc-${id}`);
    if (el) el.classList.toggle("open");
  };

  window.deleteForm = (id) => {
    if (!confirm("Supprimer session/modèle (cela supprimera aussi ses modules/blocs) ?")) return;
    state.formations = state.formations.filter(f => f.id !== id);
    const modulesToRemove = state.modules.filter(m => m.formationId === id).map(m => m.id);
    state.modules = state.modules.filter(m => m.formationId !== id);
    state.blocs = state.blocs.filter(b => !modulesToRemove.includes(b.moduleId));
    push();
  };

  window.deleteModule = (id) => {
    if (!confirm("Supprimer module (cela supprimera aussi ses blocs) ?")) return;
    state.modules = state.modules.filter(m => m.id !== id);
    state.blocs = state.blocs.filter(b => b.moduleId !== id);
    push();
  };

  window.deleteBloc = (id) => {
    if (!confirm("Supprimer bloc (et ses tâches) ?")) return;
    state.blocs = state.blocs.filter(b => b.id !== id);
    push();
  };

  window.deleteTask = (id) => {
    if (!confirm("Supprimer tâche ?")) return;
    const b = state.blocs.find(x => x.id === state.currentBlocId);
    if (!b) return;
    b.tasks = (b.tasks || []).filter(t => t.id !== id);
    state.openTaskIds.delete(String(id));
    push();
  };

  // ---------- NAV ----------
  window.showView = (id) => {
    if (["formationsView","templatesListView","archivesView"].includes(id)) state.lastParentView = id;
    state.currentView = id;
    document.querySelectorAll(".app > div").forEach(d => d.classList.add("hidden"));
    const el = document.getElementById(id);
    if (el) el.classList.remove("hidden");
    refreshUI();
  };

  window.enterFormation = (id) => {
    state.currentFormationId = id;
    const f = state.formations.find(x => x.id === id);
    document.getElementById("formationTitle").textContent = f ? f.name : "";
    showView("modulesView");
  };

  window.enterModule = (id) => {
    state.currentModuleId = id;
    const m = state.modules.find(x => x.id === id);
    document.getElementById("moduleTitle").textContent = m ? m.name : "";
    showView("blocsView");
  };

  window.enterBloc = (id) => {
    state.currentBlocId = id;
    state.openTaskIds = new Set(); // reset ouvertures à l’entrée du bloc
    const b = state.blocs.find(x => x.id === id);
    document.getElementById("blocHeaderInfo").innerHTML = b ? `<h2>${b.name}</h2><div class="muted">Date: ${b.date ? isoToEU(b.date) : "—"}</div>` : "";
    showView("tasksView");
  };

  // Fix: back from blocs should go to modules
  document.getElementById("backBtn").onclick = () => showView("modulesView");

  // ---------- SETTINGS MENU (⚙️) ----------
  window.toggleSettingsMenu = (ev) => {
    ev?.stopPropagation?.();
    const menu = document.getElementById("settingsMenu");
    if (!menu) return;
    menu.classList.toggle("hidden");
  };
  window.closeSettingsMenu = () => {
    const menu = document.getElementById("settingsMenu");
    if (!menu) return;
    menu.classList.add("hidden");
  };
  document.addEventListener("click", () => {
    const menu = document.getElementById("settingsMenu");
    if (!menu) return;
    menu.classList.add("hidden");
  });

  // ---------- BACKUP JSON ----------
  window.exportBackupJSON = () => {
    const backup = {
      exportedAt: new Date().toISOString(),
      version: 1,
      appState: {
        formations: state.formations || [],
        modules: state.modules || [],
        blocs: state.blocs || []
      }
    };

    const json = JSON.stringify(backup, null, 2);

    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const fileName = `backup-foi-${yyyy}-${mm}-${dd}.json`;

    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
  };

  // ---------- IMPORT JSON ----------
  window.triggerImport = () => {
    const input = document.getElementById("importFile");
    if (!input) return alert("Input fichier introuvable (#importFile).");
    input.value = "";
    input.click();
  };

  function isValidBackupShape(data) {
    const root = data?.appState ? data.appState : data;
    return (
      root &&
      Array.isArray(root.formations) &&
      Array.isArray(root.modules) &&
      Array.isArray(root.blocs)
    );
  }

  window.importBackupJSON = async (file) => {
    if (!file) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);

      if (!isValidBackupShape(data)) {
        alert("JSON invalide : il doit contenir formations/modules/blocs (ou appState.formations/modules/blocs).");
        return;
      }

      const root = data.appState ? data.appState : data;

      const ok = confirm("⚠️ Import : cela va REMPLACER toutes les données (formations/modules/blocs) dans Firestore. Continuer ?");
      if (!ok) return;

      state.formations = root.formations || [];
      state.modules = root.modules || [];
      state.blocs = root.blocs || [];

      state.currentFormationId = null;
      state.currentModuleId = null;
      state.currentBlocId = null;
      state.editingId = null;
      state.openTaskIds = new Set();

      await push();
      showView("formationsView");
      alert("✅ Import terminé.");
    } catch (e) {
      console.error(e);
      alert("Erreur import : " + (e?.message || e));
    }
  };

  // Initial
  refreshUI();
</script>
</body>
</html>
