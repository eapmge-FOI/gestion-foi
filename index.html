<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des tâches FOI</title>

    <style>
        :root {
            --primary:#38bdf8;
            --bg1:#0f172a;
            --bg2:#1e293b;
            --bg3:#334155;
            --text1:#f1f5f9;
            --text2:#cbd5e1;
            --success:#059669; 
            --warning:#d97706; 
            --danger:#dc2626;  
            --muted:#475569;   
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); line-height: 1.5; padding: 20px; }
        .app { max-width:1200px; margin:auto; }

        header {
            background:var(--bg2); padding:20px; border-radius:12px;
            margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;
            border: 1px solid var(--bg3);
        }

        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; }

        .card {
            background:var(--bg2); padding:20px; border-radius:12px;
            cursor:pointer; transition:.2s; border: 1px solid var(--bg3); position: relative;
            display: flex; flex-direction: column;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .prog-bg { background: var(--bg3); height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .prog-fill { background: var(--primary); height: 100%; transition: 0.3s; }

        .btn {
            background:var(--primary); color: white; border:none; padding:12px 18px;
            border-radius:8px; cursor:pointer; font-weight:bold;
        }
        .btn-secondary { background:var(--bg3); color:var(--text1); margin-right: 8px; }
        .btn-edit { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 5px 10px; font-size: 0.7rem; margin-top: auto; align-self: flex-start; }

        .task {
            padding:20px; border-radius:10px; margin-bottom:15px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 15px solid var(--muted);
        }
        .task.todo { background: rgba(71, 85, 105, 0.15); border-left-color: var(--muted); }
        .task.progress { background: rgba(217, 119, 6, 0.2); border-left-color: var(--warning); }
        .task.done { background: rgba(5, 150, 105, 0.2); border-left-color: var(--success); }
        .task.late { 
            background: rgba(220, 38, 38, 0.3); 
            border-left-color: var(--danger); 
            animation: flash-red 1.5s infinite;
        }

        @keyframes flash-red {
            0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; }
        }

        .alert-badge {
            background: var(--danger); color: white; padding: 4px 10px;
            border-radius: 4px; font-size: 0.75rem; font-weight: bold;
            position: absolute; top: 15px; right: 15px; box-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }

        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { background: var(--bg2); padding: 30px; border-radius: 12px; width: 95%; max-width: 500px; border: 1px solid var(--bg3); }
        input, select {
            width:100%; margin: 8px 0 15px 0; padding:12px;
            background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px;
        }
        .row { display: flex; gap: 10px; }
        .hidden { display:none !important; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: var(--primary); z-index: 1000; display: none; }
    </style>
</head>

<body>
<div id="loading"></div>
<div class="app">
    <header>
        <h1>📋 Gestion des tâches FOI</h1>
        <button class="btn" onclick="openModal('formationModal')">+ Formation</button>
    </header>

    <div id="formationsView">
        <div class="grid" id="formationsGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <button class="btn btn-secondary" onclick="showView('formationsView')">← Retour</button>
        <h2 id="formationTitle" style="margin: 20px 0;"></h2>
        <button class="btn" onclick="openModal('blocModal')">+ Ajouter un Bloc</button>
        <div class="grid" id="blocsGrid" style="margin-top:20px;"></div>
    </div>

    <div id="tasksView" class="hidden">
        <button class="btn btn-secondary" onclick="showView('blocsView')">← Retour</button>
        <h2 id="blocTitle" style="margin: 10px 0 5px 0;"></h2>
        <p id="blocInfo" style="color: var(--text2); margin-bottom: 20px;"></p>
        <button class="btn" onclick="openModal('taskModal')">+ Ajouter une Tâche</button>
        <div id="tasksList" style="margin-top:20px;"></div>
    </div>
</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Nouvelle formation</h3>
        <input id="formationName" placeholder="Nom de la formation">
        <select id="formationType">
            <option value="pm">Police Municipale</option>
            <option value="pc">Police Cantonale</option>
            <option value="asp">ASP</option>
        </select>
        <button class="btn-secondary" onclick="closeModal('formationModal')">Annuler</button>
        <button class="btn" onclick="saveFormation()">Créer</button>
    </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="blocModalTitle">Nouveau Bloc</h3>
        <input id="blocName" placeholder="Nom du bloc">
        <label>Date prévue du bloc :</label>
        <input id="blocDate" type="date">
        <div class="row">
            <div style="flex:1"><label>Resp. 1 (Init.)</label><input id="resp1" maxlength="3"></div>
            <div style="flex:1"><label>Resp. 2 (Init.)</label><input id="resp2" maxlength="3"></div>
        </div>
        <button class="btn-secondary" onclick="closeModal('blocModal')">Annuler</button>
        <button class="btn" onclick="saveBloc()">Enregistrer</button>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Nouvelle tâche</h3>
        <input id="taskTitle" placeholder="Titre de la tâche">
        <label>🏁 À terminer :</label>
        <div class="row">
            <input id="endVal" type="number" value="1" style="flex:1">
            <select id="endUnit" style="flex:2">
                <option value="days">Jours avant le bloc</option>
                <option value="weeks">Semaines avant le bloc</option>
                <option value="months">Mois avant le bloc</option>
            </select>
        </div>
        <button class="btn-secondary" onclick="closeModal('taskModal')">Annuler</button>
        <button class="btn" onclick="saveTask()">Ajouter</button>
    </div>
</div>

<script type="module">
    // --- IMPORT FIREBASE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE",
        authDomain: "gestion-des-taches-foi.firebaseapp.com",
        projectId: "gestion-des-taches-foi",
        storageBucket: "gestion-des-taches-foi.firebasestorage.app",
        messagingSenderId: "538286716668",
        appId: "1:538286716668:web:b86f8d5f606c78494f4979"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- ETAT GLOBAL ---
    let state = {
        formations: [],
        blocs: [],
        currentFormationId: null,
        currentBlocId: null,
        editingBlocId: null,
        currentView: 'formationsView'
    };

    // --- SYNCHRONISATION TEMPS RÉEL ---
    onSnapshot(doc(db, "data", "appState"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            state.formations = data.formations || [];
            state.blocs = data.blocs || [];
            refreshUI();
        }
    });

    async function pushToFirebase() {
        document.getElementById('loading').style.display = 'block';
        try {
            await setDoc(doc(db, "data", "appState"), {
                formations: state.formations,
                blocs: state.blocs
            });
        } catch (e) { console.error(e); alert("Erreur de synchro Cloud"); }
        document.getElementById('loading').style.display = 'none';
    }

    // --- LOGIQUE METIER ---
    function getDeadline(blocDate, val, unit) {
        if(!blocDate) return null;
        let d = new Date(blocDate);
        let amount = parseInt(val);
        if(unit === 'days') d.setDate(d.getDate() - amount);
        else if(unit === 'weeks') d.setDate(d.getDate() - (amount * 7));
        else if(unit === 'months') d.setMonth(d.getMonth() - amount);
        d.setHours(0,0,0,0);
        return d;
    }

    function isBlocLate(bloc) {
        const today = new Date(); today.setHours(0,0,0,0);
        return (bloc.tasks || []).some(t => {
            const dl = getDeadline(bloc.date, t.endVal, t.endUnit);
            return (t.status !== 'done' && dl && dl < today);
        });
    }

    // --- UI RENDERING ---
    function refreshUI() {
        if(state.currentView === 'formationsView') renderFormations();
        else if(state.currentView === 'blocsView') renderBlocs();
        else if(state.currentView === 'tasksView') renderTasks();
    }

    function renderFormations() {
        const grid = document.getElementById("formationsGrid");
        grid.innerHTML = state.formations.map(f => `
            <div class="card" onclick="enterFormation(${f.id})">
                <h3>${f.name}</h3>
                <p style="color:var(--primary); font-weight:bold;">${f.type.toUpperCase()}</p>
            </div>
        `).join("");
    }

    function renderBlocs() {
        const grid = document.getElementById("blocsGrid");
        let blocs = state.blocs.filter(b => b.formationId === state.currentFormationId);
        const today = new Date(); today.setHours(0,0,0,0);

        blocs.sort((a, b) => {
            const aL = isBlocLate(a); const bL = isBlocLate(b);
            if (aL && !bL) return -1; if (!aL && bL) return 1;
            if (!a.date) return 1; if (!b.date) return -1;
            return new Date(a.date) - new Date(b.date);
        });

        grid.innerHTML = blocs.map(b => {
            const total = b.tasks.length;
            const done = b.tasks.filter(t => t.status === 'done').length;
            const prog = total === 0 ? 0 : Math.round((done / total) * 100);
            return `
                <div class="card" onclick="enterBloc(${b.id})">
                    ${isBlocLate(b) ? '<span class="alert-badge">RETARD</span>' : ''}
                    <h3>${b.name}</h3>
                    <p>📅 Date: ${b.date || '<i>À définir</i>'}</p>
                    <p>👥 Resps: <b>${b.r1 || '--'} / ${b.r2 || '--'}</b></p>
                    <div class="prog-bg"><div class="prog-fill" style="width:${prog}%"></div></div>
                    <small>${done}/${total} terminées</small>
                    <button class="btn-edit" onclick="editBloc(event, ${b.id})">Modifier Infos</button>
                </div>
            `;
        }).join("");
    }

    function renderTasks() {
        const list = document.getElementById("tasksList");
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        const today = new Date(); today.setHours(0,0,0,0);
        if(!b || b.tasks.length === 0) { list.innerHTML = "<p>Aucune tâche.</p>"; return; }

        list.innerHTML = b.tasks.map(t => {
            const dl = getDeadline(b.date, t.endVal, t.endUnit);
            let sClass = t.status; 
            let sLabel = t.status === 'todo' ? 'À faire' : (t.status === 'progress' ? 'En cours' : 'Terminé');
            if(t.status !== 'done' && dl && dl < today) { sClass = 'late'; sLabel = 'EN RETARD'; }

            return `
                <div class="task ${sClass}">
                    <div style="flex:1">
                        <strong style="font-size:1.3rem">${t.title}</strong><br>
                        <b>Échéance : ${dl ? dl.toLocaleDateString() : 'Attente date bloc'}</b>
                    </div>
                    <div style="text-align:right">
                        <span style="font-weight:bold">${sLabel}</span><br>
                        <button class="btn" style="margin-top:10px;" onclick="cycleStatus(${t.id})">Statut</button>
                    </div>
                </div>
            `;
        }).join("");
    }

    // --- FONCTIONS GLOBAL (ATTACHÉES À WINDOW) ---
    window.showView = (id) => {
        state.currentView = id;
        document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        refreshUI();
    };

    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    
    window.closeModal = (id) => {
        document.getElementById(id).classList.add("hidden");
        document.querySelectorAll(`#${id} input`).forEach(i => i.value = "");
        state.editingBlocId = null;
    };

    window.saveFormation = () => {
        const name = document.getElementById("formationName").value;
        if(!name) return;
        state.formations.push({ id: Date.now(), name, type: document.getElementById("formationType").value });
        pushToFirebase(); window.closeModal('formationModal');
    };

    window.enterFormation = (id) => {
        state.currentFormationId = id;
        const f = state.formations.find(f => f.id === id);
        document.getElementById("formationTitle").textContent = f.name;
        window.showView("blocsView");
    };

    window.editBloc = (e, id) => {
        e.stopPropagation(); state.editingBlocId = id;
        const b = state.blocs.find(b => b.id === id);
        document.getElementById("blocName").value = b.name;
        document.getElementById("blocDate").value = b.date || "";
        document.getElementById("resp1").value = b.r1 || "";
        document.getElementById("resp2").value = b.r2 || "";
        window.openModal('blocModal');
    };

    window.saveBloc = () => {
        const name = document.getElementById("blocName").value;
        const date = document.getElementById("blocDate").value;
        const r1 = document.getElementById("resp1").value;
        const r2 = document.getElementById("resp2").value;
        if(state.editingBlocId) {
            const b = state.blocs.find(b => b.id === state.editingBlocId);
            b.name = name; b.date = date; b.r1 = r1; b.r2 = r2;
        } else {
            state.blocs.push({ id: Date.now(), formationId: state.currentFormationId, name, date, r1, r2, tasks: [] });
        }
        pushToFirebase(); window.closeModal('blocModal');
    };

    window.enterBloc = (id) => {
        state.currentBlocId = id;
        const b = state.blocs.find(b => b.id === id);
        document.getElementById("blocTitle").textContent = b.name;
        document.getElementById("blocInfo").textContent = `Date : ${b.date || '?'} | Responsables : ${b.r1 || '--'} & ${b.r2 || '--'}`;
        window.showView("tasksView");
    };

    window.saveTask = () => {
        const title = document.getElementById("taskTitle").value;
        if(!title) return;
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        b.tasks.push({
            id: Date.now(), title, status: 'todo',
            endVal: document.getElementById("endVal").value,
            endUnit: document.getElementById("endUnit").value
        });
        pushToFirebase(); window.closeModal('taskModal');
    };

    window.cycleStatus = (id) => {
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        const t = b.tasks.find(t => t.id === id);
        if(t.status === 'todo') t.status = 'progress';
        else if(t.status === 'progress') t.status = 'done';
        else t.status = 'todo';
        pushToFirebase();
    };

</script>
</body>
</html>
