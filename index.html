<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des tâches FOI - Expert</title>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; --success:#059669; 
            --warning:#d97706; --danger:#dc2626; --muted:#475569;   
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); line-height: 1.5; padding: 20px; }
        .app { max-width:1200px; margin:auto; }
        header { background:var(--bg2); padding:20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; }

        /* CARDS */
        .card { background:var(--bg2); padding:20px; border-radius:12px; cursor:pointer; transition:.2s; border: 1px solid var(--bg3); position: relative; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .prog-bg { background: var(--bg3); height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .prog-fill { background: var(--primary); height: 100%; transition: 0.3s; }

        /* BOUTONS */
        .btn { background:var(--primary); color: white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-secondary { background:var(--bg3); color:var(--text1); margin-right: 8px; }
        .btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .btn-icon:hover { color: var(--primary); }

        /* TACHES */
        .task-item { background: var(--bg2); border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--bg3); overflow: hidden; }
        .task-header { padding: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 10px solid var(--muted); cursor: pointer; }
        .task-header.todo { border-left-color: var(--muted); }
        .task-header.progress { border-left-color: var(--warning); }
        .task-header.done { border-left-color: var(--success); }
        .task-header.late { border-left-color: var(--danger); animation: flash 1.5s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .task-body { padding: 15px; background: rgba(0,0,0,0.2); display: none; border-top: 1px solid var(--bg3); }
        .task-body.active { display: block; }
        
        /* MODALS */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 600px; border: 1px solid var(--bg3); max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width:100%; margin: 5px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
        label { font-size: 0.85rem; color: var(--text2); }
        .row { display: flex; gap: 10px; }
        .hidden { display:none !important; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: var(--primary); z-index: 1000; display: none; }
    </style>
</head>

<body>
<div id="loading"></div>
<div class="app">
    <header>
        <h1>📋 Gestion FOI</h1>
        <button class="btn" onclick="openModal('formationModal')">+ Formation</button>
    </header>

    <div id="formationsView">
        <div class="grid" id="formationsGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <button class="btn btn-secondary" onclick="showView('formationsView')">← Retour</button>
        <div style="display:flex; justify-content: space-between; align-items: center; margin: 20px 0;">
            <h2 id="formationTitle"></h2>
            <button class="btn" onclick="openModal('blocModal')">+ Ajouter un Bloc</button>
        </div>
        <div class="grid" id="blocsGrid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <button class="btn btn-secondary" onclick="showView('blocsView')">← Retour</button>
        <div style="display:flex; justify-content: space-between; align-items: center; margin: 15px 0;">
            <div>
                <h2 id="blocTitle"></h2>
                <p id="blocInfo" style="font-size: 0.9rem; color: var(--text2);"></p>
            </div>
            <button class="btn" onclick="openModal('taskModal')">+ Ajouter une Tâche</button>
        </div>
        <div id="tasksList"></div>
    </div>
</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="formModalTitle">Nouvelle formation</h3>
        <label>Nom</label><input id="formName">
        <label>Type</label>
        <select id="formType">
            <option value="pm">Police Municipale</option>
            <option value="pc">Police Cantonale</option>
            <option value="asp">ASP</option>
        </select>
        <div class="row">
            <button class="btn-secondary" onclick="closeModal('formationModal')" style="flex:1">Annuler</button>
            <button class="btn" onclick="saveFormation()" style="flex:1">Enregistrer</button>
        </div>
    </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="blocModalTitle">Nouveau Bloc</h3>
        <label>Nom du bloc</label><input id="blocName">
        <label>Date prévue</label><input id="blocDate" type="date">
        <div class="row">
            <div style="flex:1"><label>Resp. 1</label><input id="resp1" maxlength="3"></div>
            <div style="flex:1"><label>Resp. 2</label><input id="resp2" maxlength="3"></div>
        </div>
        <div class="row">
            <button class="btn-secondary" onclick="closeModal('blocModal')" style="flex:1">Annuler</button>
            <button class="btn" onclick="saveBloc()" style="flex:1">Enregistrer</button>
        </div>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="taskModalTitle">Paramètres de la tâche</h3>
        <label>Titre de la tâche</label><input id="taskTitle">
        <label>Responsable</label><input id="taskResp" placeholder="Nom ou initiales">
        <label>Description / Détails particuliers</label>
        <textarea id="taskDesc" rows="3"></textarea>
        
        <div class="row">
            <div style="flex:1">
                <label>Commencer (Avant Bloc)</label>
                <div class="row">
                    <input id="startVal" type="number" value="1">
                    <select id="startUnit">
                        <option value="days">Jours</option>
                        <option value="weeks">Sem.</option>
                        <option value="months">Mois</option>
                        <option value="years">Années</option>
                    </select>
                </div>
            </div>
            <div style="flex:1">
                <label>Terminer (Avant Bloc)</label>
                <div class="row">
                    <input id="endVal" type="number" value="1">
                    <select id="endUnit">
                        <option value="days">Jours</option>
                        <option value="weeks">Sem.</option>
                        <option value="months">Mois</option>
                        <option value="years">Années</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="row" style="margin-top:10px;">
            <button class="btn-secondary" onclick="closeModal('taskModal')" style="flex:1">Annuler</button>
            <button class="btn" onclick="saveTask()" style="flex:1">Enregistrer</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE",
        authDomain: "gestion-des-taches-foi.firebaseapp.com",
        projectId: "gestion-des-taches-foi",
        storageBucket: "gestion-des-taches-foi.firebasestorage.app",
        messagingSenderId: "538286716668",
        appId: "1:538286716668:web:b86f8d5f606c78494f4979"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let state = { formations: [], blocs: [], currentFormationId: null, currentBlocId: null, editingId: null, currentView: 'formationsView' };

    onSnapshot(doc(db, "data", "appState"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            state.formations = data.formations || [];
            state.blocs = data.blocs || [];
            refreshUI();
        }
    });

    async function save() {
        document.getElementById('loading').style.display = 'block';
        await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs });
        document.getElementById('loading').style.display = 'none';
    }

    function calculateDate(baseDate, val, unit) {
        if(!baseDate) return null;
        let d = new Date(baseDate);
        let v = parseInt(val);
        if(unit === 'days') d.setDate(d.getDate() - v);
        else if(unit === 'weeks') d.setDate(d.getDate() - (v * 7));
        else if(unit === 'months') d.setMonth(d.getMonth() - v);
        else if(unit === 'years') d.setFullYear(d.getFullYear() - v);
        d.setHours(0,0,0,0);
        return d;
    }

    function refreshUI() {
        if(state.currentView === 'formationsView') renderFormations();
        else if(state.currentView === 'blocsView') renderBlocs();
        else if(state.currentView === 'tasksView') renderTasks();
    }

    window.renderFormations = () => {
        const grid = document.getElementById("formationsGrid");
        grid.innerHTML = state.formations.map(f => `
            <div class="card" onclick="enterFormation(${f.id})">
                <div style="display:flex; justify-content:space-between">
                    <h3>${f.name}</h3>
                    <button class="btn-icon" onclick="editFormation(event, ${f.id})">✏️</button>
                </div>
                <p style="color:var(--primary); font-weight:bold;">${f.type.toUpperCase()}</p>
                <button class="btn-duplicate" onclick="duplicateFormation(event, ${f.id})" style="margin-top:10px; background:#475569; color:white; border:none; padding:5px; border-radius:4px; font-size:0.7rem">👯 Dupliquer</button>
            </div>
        `).join("");
    }

    window.renderBlocs = () => {
        const grid = document.getElementById("blocsGrid");
        let blocs = state.blocs.filter(b => b.formationId === state.currentFormationId);
        grid.innerHTML = blocs.map(b => {
            const done = b.tasks.filter(t => t.status === 'done').length;
            const prog = b.tasks.length === 0 ? 0 : Math.round((done / b.tasks.length) * 100);
            return `
                <div class="card" onclick="enterBloc(${b.id})">
                    <div style="display:flex; justify-content:space-between">
                        <h3>${b.name}</h3>
                        <button class="btn-icon" onclick="editBloc(event, ${b.id})">✏️</button>
                    </div>
                    <p>📅 ${b.date || 'À définir'}</p>
                    <p>👥 ${b.r1 || '--'} / ${b.r2 || '--'}</p>
                    <div class="prog-bg"><div class="prog-fill" style="width:${prog}%"></div></div>
                </div>
            `;
        }).join("");
    }

    window.renderTasks = () => {
        const list = document.getElementById("tasksList");
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        const today = new Date(); today.setHours(0,0,0,0);
        if(!b) return;

        list.innerHTML = b.tasks.map(t => {
            const startD = calculateDate(b.date, t.startVal, t.startUnit);
            const endD = calculateDate(b.date, t.endVal, t.endUnit);
            let sClass = t.status;
            if(t.status !== 'done' && endD && endD < today) sClass = 'late';

            return `
                <div class="task-item">
                    <div class="task-header ${sClass}" onclick="toggleTask(${t.id})">
                        <div>
                            <strong style="font-size:1.1rem">${t.title}</strong><br>
                            <small>Fin: ${endD ? endD.toLocaleDateString() : '?'}</small>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px">
                            <span style="font-size:0.8rem; background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px">${t.resp || '--'}</span>
                            <button class="btn" onclick="cycleStatus(event, ${t.id})">${t.status.toUpperCase()}</button>
                            <button class="btn-icon" onclick="editTask(event, ${t.id})">✏️</button>
                        </div>
                    </div>
                    <div class="task-body" id="body-${t.id}">
                        <p><strong>Responsable :</strong> ${t.resp || 'Non assigné'}</p>
                        <p><strong>Période :</strong> du ${startD ? startD.toLocaleDateString() : '?'} au ${endD ? endD.toLocaleDateString() : '?'}</p>
                        <p style="margin-top:10px; white-space: pre-wrap;"><strong>Description :</strong>\n${t.desc || 'Aucune description.'}</p>
                    </div>
                </div>
            `;
        }).join("");
    }

    // --- ACTIONS ---
    window.toggleTask = (id) => document.getElementById(`body-${id}`).classList.toggle('active');

    window.saveFormation = () => {
        const name = document.getElementById("formName").value;
        if(state.editingId) {
            const f = state.formations.find(f => f.id === state.editingId);
            f.name = name; f.type = document.getElementById("formType").value;
        } else {
            state.formations.push({ id: Date.now(), name, type: document.getElementById("formType").value });
        }
        save(); closeModal('formationModal');
    };

    window.editFormation = (e, id) => {
        e.stopPropagation(); state.editingId = id;
        const f = state.formations.find(f => f.id === id);
        document.getElementById("formName").value = f.name;
        document.getElementById("formType").value = f.type;
        document.getElementById("formModalTitle").textContent = "Modifier Formation";
        openModal('formationModal');
    };

    window.saveBloc = () => {
        if(state.editingId) {
            const b = state.blocs.find(b => b.id === state.editingId);
            b.name = document.getElementById("blocName").value; b.date = document.getElementById("blocDate").value;
            b.r1 = document.getElementById("resp1").value; b.r2 = document.getElementById("resp2").value;
        } else {
            state.blocs.push({ id: Date.now(), formationId: state.currentFormationId, name: document.getElementById("blocName").value, date: document.getElementById("blocDate").value, r1: document.getElementById("resp1").value, r2: document.getElementById("resp2").value, tasks: [] });
        }
        save(); closeModal('blocModal');
    };

    window.editBloc = (e, id) => {
        e.stopPropagation(); state.editingId = id;
        const b = state.blocs.find(b => b.id === id);
        document.getElementById("blocName").value = b.name; document.getElementById("blocDate").value = b.date;
        document.getElementById("resp1").value = b.r1; document.getElementById("resp2").value = b.r2;
        openModal('blocModal');
    };

    window.saveTask = () => {
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        const taskData = {
            id: state.editingId || Date.now(),
            title: document.getElementById("taskTitle").value,
            resp: document.getElementById("taskResp").value,
            desc: document.getElementById("taskDesc").value,
            startVal: document.getElementById("startVal").value,
            startUnit: document.getElementById("startUnit").value,
            endVal: document.getElementById("endVal").value,
            endUnit: document.getElementById("endUnit").value,
            status: 'todo'
        };

        if(state.editingId) {
            const idx = b.tasks.findIndex(t => t.id === state.editingId);
            taskData.status = b.tasks[idx].status;
            b.tasks[idx] = taskData;
        } else {
            b.tasks.push(taskData);
        }
        save(); closeModal('taskModal');
    };

    window.editTask = (e, id) => {
        e.stopPropagation(); state.editingId = id;
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        const t = b.tasks.find(t => t.id === id);
        document.getElementById("taskTitle").value = t.title;
        document.getElementById("taskResp").value = t.resp || "";
        document.getElementById("taskDesc").value = t.desc || "";
        document.getElementById("startVal").value = t.startVal;
        document.getElementById("startUnit").value = t.startUnit;
        document.getElementById("endVal").value = t.endVal;
        document.getElementById("endUnit").value = t.endUnit;
        openModal('taskModal');
    };

    window.cycleStatus = (e, id) => {
        e.stopPropagation();
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        const t = b.tasks.find(t => t.id === id);
        const seq = ['todo', 'progress', 'done'];
        t.status = seq[(seq.indexOf(t.status) + 1) % 3];
        save();
    };

    window.duplicateFormation = (e, id) => {
        e.stopPropagation();
        const orig = state.formations.find(f => f.id === id);
        const newFid = Date.now();
        state.formations.push({ ...orig, id: newFid, name: "COPIE - " + orig.name });
        const newBlocs = state.blocs.filter(b => b.formationId === id).map(b => ({
            ...b, id: Math.random(), formationId: newFid, date: "", tasks: b.tasks.map(t => ({ ...t, id: Math.random(), status: 'todo' }))
        }));
        state.blocs = [...state.blocs, ...newBlocs];
        save();
    };

    // NAV
    window.showView = (id) => { state.currentView = id; document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); refreshUI(); };
    window.enterFormation = (id) => { state.currentFormationId = id; const f = state.formations.find(f => f.id === id); document.getElementById("formationTitle").textContent = f.name; window.showView("blocsView"); };
    window.enterBloc = (id) => { state.currentBlocId = id; const b = state.blocs.find(b => b.id === id); document.getElementById("blocTitle").textContent = b.name; document.getElementById("blocInfo").textContent = `Date: ${b.date || '?'} | Responsables: ${b.r1}/${b.r2}`; window.showView("tasksView"); };
    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => { 
        document.getElementById(id).classList.add("hidden"); 
        document.querySelectorAll(`#${id} input, #${id} textarea`).forEach(i => i.value = ""); 
        state.editingId = null; 
    };
</script>
</body>
</html>
