<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion FOI - Pilotage</title>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; 
            --success:#059669; --danger:#dc2626;
            --polcant-blue: #334b7a; --apm-gray: #334155; --asp-light: #94a3b8;
            --flag-red: #e11d48; --flag-yellow: #fbbf24;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); padding: 10px 20px; }
        .app { max-width:1200px; margin:auto; }
        
        header, .mini-header { background:var(--bg2); padding:15px 20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }

        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px; }

        /* PROGRESSION */
        .prog-container { background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .prog-bar { height: 100%; background: var(--success); transition: width 0.4s ease; }

        /* CARDS */
        .card { background:var(--bg2); padding:18px; border-radius:12px; cursor:pointer; transition:.2s; border: 1px solid var(--bg3); position: relative; display:flex; flex-direction:column; min-height: 160px; }
        .card:hover { border-color: var(--primary); }
        .card.style-apm { background: var(--apm-gray); padding-top: 25px; }
        .card.style-apm::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background: var(--flag-yellow); }
        .card.style-apm::after { content:''; position:absolute; top:3px; left:0; width:100%; height:3px; background: var(--flag-red); }
        .card.style-polcant { background: var(--polcant-blue); }
        .card.style-asp { background: var(--asp-light); color: #0f172a; }

        .btn { background:var(--primary); color: white; border:none; padding: 8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .btn-secondary { background:var(--bg3); color:var(--text1); padding: 6px 12px; font-size: 0.8rem; border-radius: 6px; border:none; cursor:pointer; }
        
        .card-actions { margin-top: auto; display: flex; gap: 10px; align-items: center; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; }

        .task-item { background: var(--bg2); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--bg3); }
        .task-header { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .status-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .status-todo { background: var(--bg3); } .status-done { background: var(--success); }

        .hidden { display:none !important; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 550px; border: 1px solid var(--bg3); max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width:100%; margin: 8px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
        label { font-size: 0.85rem; color: var(--text2); }
    </style>
</head>

<body>
<div class="app">
    <div id="formationsView">
        <header>
            <h1>🚀 Sessions Actives</h1>
            <div style="display:flex; gap:10px">
                <button class="btn" style="background:#6366f1" onclick="showView('templatesListView')">📂 Modèles</button>
                <button class="btn" onclick="openFormModal(false)">+ Session</button>
            </div>
        </header>
        <div class="grid" id="activeGrid"></div>
    </div>

    <div id="templatesListView" class="hidden">
        <header>
            <button class="btn-secondary" onclick="showView('formationsView')">← Retour</button>
            <h1>📂 Modèles de Référence</h1>
            <button class="btn" style="background:#6366f1" onclick="openFormModal(true)">+ Nouveau Modèle</button>
        </header>
        <div class="grid" id="templateGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div class="mini-header">
            <button class="btn-secondary" id="backBtn">← Retour</button>
            <h2 id="formationTitle"></h2>
            <button class="btn" onclick="openModal('blocModal')">+ Bloc</button>
        </div>
        <div class="grid" id="blocsGrid"></div>
    </div>

    <div id="tasksView" class="hidden">
        <div class="mini-header">
            <button class="btn-secondary" onclick="showView('blocsView')">← Retour</button>
            <div id="blocHeaderInfo"></div>
            <button class="btn" onclick="openModal('taskModal')">+ Tâche</button>
        </div>
        <div id="tasksList"></div>
    </div>
</div>

<div id="blocModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Bloc de formation</h3>
        <label>Nom du bloc</label><input id="blocName">
        <label>Date du bloc</label><input id="blocDate" type="date">
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Responsable 1 (Initiales)</label><input id="blocR1" maxlength="3"></div>
            <div style="flex:1"><label>Responsable 2 (Initiales)</label><input id="blocR2" maxlength="3"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn-secondary" style="flex:1" onclick="closeModal('blocModal')">Annuler</button>
            <button class="btn" style="flex:1" onclick="saveBloc()">Enregistrer</button>
        </div>
    </div>
</div>

<div id="taskModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>Paramètres de la tâche</h3>
        <label>Titre</label><input id="taskTitle">
        <label>Responsable</label><input id="taskResp">
        
        <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <p style="font-size: 0.8rem; margin-bottom: 10px; color: var(--primary)">ÉCHÉANCE (Temps AVANT la date du bloc)</p>
            <div style="display:flex; gap:10px; align-items:center">
                <input type="number" id="taskTimeVal" value="1" style="width: 80px; margin:0">
                <select id="taskTimeUnit" style="margin:0">
                    <option value="days">Jours</option>
                    <option value="weeks">Semaines</option>
                    <option value="months">Mois</option>
                </select>
                <span>avant le bloc</span>
            </div>
        </div>

        <label>Description / Notes</label><textarea id="taskDesc" rows="3"></textarea>
        
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn-secondary" style="flex:1" onclick="closeModal('taskModal')">Annuler</button>
            <button class="btn" style="flex:1" onclick="saveTask()">Enregistrer</button>
        </div>
    </div>
</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="formModalTitle">Formation</h3>
        <input type="hidden" id="formIsTemplate">
        <label>Nom</label><input id="formName">
        <label>Corps</label>
        <select id="formType">
            <option value="apm">APM</option>
            <option value="polcant">PolCant</option>
            <option value="asp">ASP</option>
        </select>
        <div id="dateSection"><label>Date début</label><input id="formStart" type="date"></div>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn-secondary" style="flex:1" onclick="closeModal('formationModal')">Annuler</button>
            <button class="btn" style="flex:1" onclick="saveFormation()">Enregistrer</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE", authDomain: "gestion-des-taches-foi.firebaseapp.com", projectId: "gestion-des-taches-foi", storageBucket: "gestion-des-taches-foi.firebasestorage.app", messagingSenderId: "538286716668", appId: "1:538286716668:web:b86f8d5f606c78494f4979" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let state = { formations: [], blocs: [], currentFormationId: null, currentBlocId: null, editingId: null, currentView: 'formationsView', lastParentView: 'formationsView' };

    onSnapshot(doc(db, "data", "appState"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            state.formations = data.formations || [];
            state.blocs = data.blocs || [];
            refreshUI();
        }
    });

    async function save() { await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs }); }

    function getProgression(items) {
        if (!items || items.length === 0) return 0;
        const done = items.filter(i => i.status === 'done').length;
        return Math.round((done / items.length) * 100);
    }

    function calculateDeadline(blocDate, val, unit) {
        if (!blocDate) return "Non planifié";
        const d = new Date(blocDate);
        if (unit === 'days') d.setDate(d.getDate() - val);
        else if (unit === 'weeks') d.setDate(d.getDate() - (val * 7));
        else if (unit === 'months') d.setMonth(d.getMonth() - val);
        return d.toLocaleDateString();
    }

    function refreshUI() {
        if(state.currentView === 'formationsView') renderList("activeGrid", state.formations.filter(f => !f.isTemplate));
        else if(state.currentView === 'templatesListView') renderList("templateGrid", state.formations.filter(f => f.isTemplate));
        else if(state.currentView === 'blocsView') renderBlocs();
        else if(state.currentView === 'tasksView') renderTasks();
    }

    window.renderList = (containerId, list) => {
        const grid = document.getElementById(containerId);
        grid.innerHTML = list.map(f => {
            const fBlocs = state.blocs.filter(b => b.formationId === f.id);
            const allTasks = fBlocs.flatMap(b => b.tasks || []);
            const prog = getProgression(allTasks);
            return `
                <div class="card style-${f.type}" onclick="enterFormation(${f.id})">
                    <h3>${f.name}</h3>
                    <div class="prog-container"><div class="prog-bar" style="width:${prog}%"></div></div>
                    <div class="card-actions">
                        <button class="btn-icon" onclick="editFormation(event, ${f.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteFormation(event, ${f.id})">🗑️</button>
                    </div>
                </div>
            `;
        }).join("");
    };

    window.renderBlocs = () => {
        const grid = document.getElementById("blocsGrid");
        const blocs = state.blocs.filter(b => b.formationId === state.currentFormationId);
        grid.innerHTML = blocs.map(b => {
            const prog = getProgression(b.tasks);
            return `
                <div class="card" onclick="enterBloc(${b.id})">
                    <div style="display:flex; justify-content:space-between">
                        <h3>${b.name}</h3>
                        <div style="font-size:0.7rem; color:var(--primary)">👥 ${b.r1 || '?'}/${b.r2 || '?'}</div>
                    </div>
                    <p style="font-size:0.8rem">📅 ${b.date || '---'}</p>
                    <div class="prog-container"><div class="prog-bar" style="width:${prog}%"></div></div>
                    <div class="card-actions">
                        <button class="btn-icon" onclick="editBloc(event, ${b.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteBloc(event, ${b.id})">🗑️</button>
                    </div>
                </div>
            `;
        }).join("");
    };

    window.renderTasks = () => {
        const list = document.getElementById("tasksList");
        const b = state.blocs.find(b => b.id === state.currentBlocId);
        list.innerHTML = b.tasks.map(t => `
            <div class="task-item">
                <div class="task-header" onclick="toggleTaskStatus(${t.id})">
                    <div>
                        <span class="status-badge status-${t.status}">${t.status === 'done' ? 'Fait' : 'À faire'}</span>
                        <strong style="margin-left:10px">${t.title}</strong>
                        <div style="font-size:0.75rem; color:var(--text2); margin-top:4px">
                            ⏳ Échéance : ${calculateDeadline(b.date, t.timeVal, t.unit)} (Resp: ${t.resp || '?'})
                        </div>
                    </div>
                    <div style="display:flex; gap:10px">
                        <button class="btn-icon" onclick="editTask(event, ${t.id})">✏️</button>
                        <button class="btn-icon" onclick="deleteTask(event, ${t.id})">🗑️</button>
                    </div>
                </div>
            </div>
        `).join("");
    };

    // --- ACTIONS ---
    window.saveBloc = () => {
        const data = { 
            id: state.editingId || Date.now(), 
            formationId: state.currentFormationId, 
            name: document.getElementById("blocName").value, 
            date: document.getElementById("blocDate").value, 
            r1: document.getElementById("blocR1").value, 
            r2: document.getElementById("blocR2").value, 
            tasks: state.editingId ? state.blocs.find(x => x.id === state.editingId).tasks : [] 
        };
        if(state.editingId) state.blocs = state.blocs.map(b => b.id === state.editingId ? data : b);
        else state.blocs.push(data);
        save(); closeModal('blocModal');
    };

    window.saveTask = () => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = { 
            id: state.editingId || Date.now(), 
            title: document.getElementById("taskTitle").value, 
            resp: document.getElementById("taskResp").value, 
            desc: document.getElementById("taskDesc").value, 
            timeVal: parseInt(document.getElementById("taskTimeVal").value),
            unit: document.getElementById("taskTimeUnit").value,
            status: state.editingId ? b.tasks.find(x => x.id === state.editingId).status : 'todo'
        };
        if(state.editingId) b.tasks = b.tasks.map(x => x.id === state.editingId ? t : x);
        else b.tasks.push(t);
        save(); closeModal('taskModal');
    };

    window.toggleTaskStatus = (id) => {
        const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = b.tasks.find(x => x.id === id);
        t.status = t.status === 'done' ? 'todo' : 'done';
        save();
    };

    window.editBloc = (e, id) => {
        e.stopPropagation(); state.editingId = id; const b = state.blocs.find(x => x.id === id);
        document.getElementById("blocName").value = b.name; document.getElementById("blocDate").value = b.date;
        document.getElementById("blocR1").value = b.r1 || ""; document.getElementById("blocR2").value = b.r2 || "";
        openModal('blocModal');
    };

    window.editTask = (e, id) => {
        e.stopPropagation(); state.editingId = id; const b = state.blocs.find(x => x.id === state.currentBlocId);
        const t = b.tasks.find(x => x.id === id);
        document.getElementById("taskTitle").value = t.title; document.getElementById("taskResp").value = t.resp;
        document.getElementById("taskDesc").value = t.desc; document.getElementById("taskTimeVal").value = t.timeVal;
        document.getElementById("taskTimeUnit").value = t.unit;
        openModal('taskModal');
    };

    // --- NAVIGATION ---
    window.showView = (id) => { 
        if (id !== 'blocsView' && id !== 'tasksView') state.lastParentView = id;
        state.currentView = id; 
        document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
        refreshUI(); 
    };
    window.enterFormation = (id) => { state.currentFormationId = id; document.getElementById("formationTitle").textContent = state.formations.find(x => x.id === id).name; showView("blocsView"); };
    window.enterBloc = (id) => { state.currentBlocId = id; const b = state.blocs.find(x => x.id === id); document.getElementById("blocHeaderInfo").innerHTML = `<h2>${b.name}</h2><small>Resp: ${b.r1}/${b.r2}</small>`; showView("tasksView"); };
    document.getElementById('backBtn').onclick = () => showView(state.lastParentView);
    window.openFormModal = (isTpl) => { state.editingId = null; document.getElementById("formIsTemplate").value = isTpl; document.getElementById("dateSection").style.display = isTpl ? "none" : "block"; openModal('formationModal'); };
    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => { document.getElementById(id).classList.add("hidden"); state.editingId = null; document.querySelectorAll(`#${id} input, #${id} textarea`).forEach(i => i.value = ""); };
    // (Ajouter ici les fonctions deleteFormation, deleteBloc, deleteTask du script précédent)
</script>
</body>
</html>
