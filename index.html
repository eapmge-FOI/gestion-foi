<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion FOI - Séparation Modèles/Sessions</title>
    <style>
        :root {
            --primary:#38bdf8; --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
            --text1:#f1f5f9; --text2:#cbd5e1; 
            --success:#059669; --danger:#dc2626;
            --polcant-blue: #334b7a; --apm-gray: #334155; --asp-light: #94a3b8;
            --flag-red: #e11d48; --flag-yellow: #fbbf24;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background:var(--bg1); color:var(--text1); padding: 10px 20px; }
        .app { max-width:1200px; margin:auto; }
        
        /* HEADERS */
        header { background:var(--bg2); padding:15px 20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--bg3); }
        .header-btns { display: flex; gap: 10px; }

        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px; }

        /* CARDS */
        .card { background:var(--bg2); padding:18px; border-radius:12px; cursor:pointer; transition:.2s; border: 1px solid var(--bg3); position: relative; display:flex; flex-direction:column; min-height: 140px; }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }
        
        .card.style-apm { background: var(--apm-gray); padding-top: 25px; }
        .card.style-apm::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background: var(--flag-yellow); }
        .card.style-apm::after { content:''; position:absolute; top:3px; left:0; width:100%; height:3px; background: var(--flag-red); }
        
        .card.style-polcant { background: var(--polcant-blue); border-color: #475569; }
        
        .card.style-asp { background: var(--asp-light); color: #0f172a; border-color: #cbd5e1; }
        .card.style-asp h3, .card.style-asp p, .card.style-asp small { color: #0f172a; }

        /* BUTTONS */
        .btn { background:var(--primary); color: white; border:none; padding: 8px 16px; border-radius:8px; cursor:pointer; font-weight:bold; font-size: 0.85rem; }
        .btn-model { background: #6366f1; }
        .btn-secondary { background:var(--bg3); color:var(--text1); padding: 6px 12px; font-size: 0.8rem; border: none; border-radius: 6px; cursor: pointer; }
        
        .card-actions { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 10px; }
        .btn-icon { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; }
        .card.style-asp .btn-icon { color: #0f172a; }

        .hidden { display:none !important; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--bg2); padding: 25px; border-radius: 12px; width: 95%; max-width: 500px; border: 1px solid var(--bg3); }
        input, select { width:100%; margin: 8px 0 15px 0; padding:10px; background: var(--bg1); border: 1px solid var(--bg3); color: white; border-radius: 6px; }
    </style>
</head>

<body>
<div class="app">
    
    <div id="formationsView">
        <header>
            <h1>🚀 Sessions Actives</h1>
            <div class="header-btns">
                <button class="btn btn-model" onclick="showView('templatesListView')">📂 Modèles</button>
                <button class="btn" onclick="prepareModal(false)">+ Ajouter Session</button>
            </div>
        </header>
        <div class="grid" id="activeGrid"></div>
    </div>

    <div id="templatesListView" class="hidden">
        <header>
            <div style="display:flex; align-items:center; gap:15px">
                <button class="btn-secondary" onclick="showView('formationsView')">← Retour</button>
                <h1>📂 Bibliothèque de Modèles</h1>
            </div>
            <button class="btn btn-model" onclick="prepareModal(true)">+ Nouveau Modèle</button>
        </header>
        <div class="grid" id="templateGrid"></div>
    </div>

    <div id="blocsView" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:1px solid var(--bg3); padding-bottom:10px;">
            <div style="display:flex; align-items:center; gap:15px">
                <button id="backFromBlocs" class="btn-secondary">← Retour</button>
                <h2 id="formationTitle" style="font-size: 1.1rem; color: var(--primary);"></h2>
            </div>
            <button class="btn" onclick="openModal('blocModal')">+ Bloc</button>
        </div>
        <div class="grid" id="blocsGrid"></div>
    </div>

</div>

<div id="formationModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="modalTitle">Configuration</h3>
        <input type="hidden" id="formIsTemplate">
        <label>Nom</label><input id="formName" placeholder="Nom de la formation">
        <label>Corps</label>
        <select id="formType">
            <option value="apm">APM</option>
            <option value="polcant">PolCant</option>
            <option value="asp">ASP</option>
        </select>
        <div id="dateSection">
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>Date début</label><input id="formStart" type="date"></div>
                <div style="flex:1"><label>Date fin</label><input id="formEnd" type="date"></div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn-secondary" style="flex:1" onclick="closeModal('formationModal')">Annuler</button>
            <button class="btn" style="flex:1" onclick="saveFormation()">Enregistrer</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAfwt7M5vjzo1H4jw8EQ6auENy8LxXMQhE",
        authDomain: "gestion-des-taches-foi.firebaseapp.com",
        projectId: "gestion-des-taches-foi",
        storageBucket: "gestion-des-taches-foi.firebasestorage.app",
        messagingSenderId: "538286716668",
        appId: "1:538286716668:web:b86f8d5f606c78494f4979"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let state = { formations: [], blocs: [], currentFormationId: null, currentView: 'formationsView', lastParentView: 'formationsView' };

    onSnapshot(doc(db, "data", "appState"), (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            state.formations = data.formations || [];
            state.blocs = data.blocs || [];
            refreshUI();
        }
    });

    async function save() { await setDoc(doc(db, "data", "appState"), { formations: state.formations, blocs: state.blocs }); }

    function refreshUI() {
        if(state.currentView === 'formationsView') renderList("activeGrid", state.formations.filter(f => !f.isTemplate));
        else if(state.currentView === 'templatesListView') renderList("templateGrid", state.formations.filter(f => f.isTemplate));
        else if(state.currentView === 'blocsView') renderBlocs();
    }

    window.renderList = (containerId, list) => {
        const grid = document.getElementById(containerId);
        const sorted = containerId === "activeGrid" ? list.sort((a,b) => new Date(a.start) - new Date(b.start)) : list;
        
        grid.innerHTML = sorted.map(f => {
            const corpsDisplay = f.type === 'apm' ? 'APM' : (f.type === 'polcant' ? 'PolCant' : 'ASP');
            return `
                <div class="card style-${f.type}" onclick="enterFormation(${f.id})">
                    <h3>${f.name}</h3>
                    <p style="font-size:0.8rem; font-weight:bold; opacity:0.9; margin-top:2px;">${corpsDisplay}</p>
                    ${!f.isTemplate ? `<small>📅 ${new Date(f.start).toLocaleDateString()}</small>` : '<small>📑 Modèle de référence</small>'}
                    <div class="card-actions">
                        <button class="btn-icon" onclick="deleteFormation(event, ${f.id})">🗑️</button>
                        ${f.isTemplate ? `<button class="btn-secondary" onclick="deploySession(event, ${f.id})">⚡ Déployer</button>` : ''}
                    </div>
                </div>
            `;
        }).join("");
    }

    window.prepareModal = (isTemplate) => {
        document.getElementById("modalTitle").textContent = isTemplate ? "Nouveau Modèle" : "Nouvelle Session";
        document.getElementById("formIsTemplate").value = isTemplate;
        document.getElementById("dateSection").style.display = isTemplate ? "none" : "block";
        openModal('formationModal');
    }

    window.saveFormation = () => {
        const isTpl = document.getElementById("formIsTemplate").value === "true";
        state.formations.push({
            id: Date.now(),
            name: document.getElementById("formName").value,
            type: document.getElementById("formType").value,
            isTemplate: isTpl,
            start: isTpl ? "" : document.getElementById("formStart").value,
            end: isTpl ? "" : document.getElementById("formEnd").value
        });
        save(); closeModal('formationModal');
    }

    window.deploySession = (e, id) => {
        e.stopPropagation();
        const tpl = state.formations.find(f => f.id === id);
        const date = prompt("Date de début (AAAA-MM-JJ) ?");
        if(date) {
            const newFid = Date.now();
            state.formations.push({ ...tpl, id: newFid, name: tpl.name + " (Copie)", isTemplate: false, start: date });
            state.blocs.filter(b => b.formationId === id).forEach(b => {
                state.blocs.push({ ...b, id: Math.random(), formationId: newFid, tasks: b.tasks.map(t => ({...t, id: Math.random(), status: 'todo'})) });
            });
            save(); showView('formationsView');
        }
    }

    window.deleteFormation = (e, id) => {
        e.stopPropagation();
        if(confirm("Supprimer définitivement ?")) {
            state.formations = state.formations.filter(f => f.id !== id);
            state.blocs = state.blocs.filter(b => b.formationId !== id);
            save();
        }
    }

    window.showView = (id) => { 
        if (id !== 'blocsView') state.lastParentView = id;
        state.currentView = id; 
        document.querySelectorAll('.app > div').forEach(d => d.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
        refreshUI(); 
    };

    window.enterFormation = (id) => { 
        state.currentFormationId = id; 
        document.getElementById("formationTitle").textContent = state.formations.find(x => x.id === id).name;
        showView("blocsView"); 
    };

    document.getElementById('backFromBlocs').onclick = () => showView(state.lastParentView);

    window.openModal = (id) => document.getElementById(id).classList.remove("hidden");
    window.closeModal = (id) => {
        document.getElementById(id).classList.add("hidden");
        document.querySelectorAll(`#${id} input`).forEach(i => i.value = "");
    }
</script>
</body>
</html>
